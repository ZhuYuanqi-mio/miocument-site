let markedWords = loadMarkedWords();

function getMwTopic(topicId) {
  if (!markedWords[topicId]) {
    markedWords[topicId] = { words: [], groups: ["未分组"], records: [] };
  }
  return markedWords[topicId];
}

function findChineseForEnglish(topicId, enText) {
  const en = enText.trim().toLowerCase();
  for (const book of BOOKS) {
    for (const topic of book.topics) {
      if (topic.id !== topicId) continue;
      for (const g of topic.groups) {
        for (const p of g.phrases) {
          if (p.en.trim().toLowerCase() === en) return p.cn;
        }
      }
    }
  }
  return "";
}

function addMarkedWord(topicId, enText) {
  const mwt = getMwTopic(topicId);
  const normalized = enText.trim();
  if (!normalized) return;
  if (mwt.words.some(w => w.en.toLowerCase() === normalized.toLowerCase())) return;
  const cn = findChineseForEnglish(topicId, normalized);
  mwt.words.push({ en: normalized, cn: cn, group: "未分组" });
  saveMarkedWords();
}

function removeMarkedWord(topicId, enText) {
  const mwt = getMwTopic(topicId);
  const normalized = enText.trim().toLowerCase();
  mwt.words = mwt.words.filter(w => w.en.toLowerCase() !== normalized);
  saveMarkedWords();
}

function getMarkedWordCount(topicId) {
  if (!markedWords[topicId]) return 0;
  return markedWords[topicId].words.length;
}

function hlKey(topicId, type, idx) {
  return topicId + ":" + type + ":" + idx;
}

function collectHighlightsFromEl(containerEl) {
  const marks = containerEl.querySelectorAll("mark.user-hl");
  const list = [];
  marks.forEach(m => {
    const range = document.createRange();
    range.selectNodeContents(m);
    const text = m.textContent;
    const parent = m.closest("[data-hl-key]");
    if (parent && text) {
      const fullText = parent.textContent;
      const startOffset = fullText.indexOf(text);
      list.push({ text: text, offset: startOffset });
    }
  });
  return list;
}

function saveHighlightsForContainer(containerEl) {
  const key = containerEl.getAttribute("data-hl-key");
  if (!key) return;
  const list = [];
  containerEl.querySelectorAll("mark.user-hl").forEach(m => {
    list.push(m.textContent);
  });
  if (list.length > 0) {
    userHighlights[key] = list;
  } else {
    delete userHighlights[key];
  }
  saveHighlights();
}

function applyUserHighlights(containerEl) {
  const key = containerEl.getAttribute("data-hl-key");
  if (!key || !userHighlights[key]) return;
  const phrases = userHighlights[key];
  let html = containerEl.innerHTML;
  const safe = [];
  html = html.replace(/<[^>]+>/g, match => {
    safe.push(match);
    return '\x01TAG' + (safe.length - 1) + '\x01';
  });
  phrases.forEach(phrase => {
    const escaped = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(escaped, 'g');
    html = html.replace(regex, match => '<mark class="user-hl">' + match + '</mark>');
  });
  safe.forEach((tag, i) => {
    html = html.replace('\x01TAG' + i + '\x01', tag);
  });
  containerEl.innerHTML = html;
}

function initMemorizeHighlights() {
  const popup = document.getElementById("hlPopup");
  const content = document.getElementById("content");

  document.querySelectorAll("[data-hl-key]").forEach(el => {
    applyUserHighlights(el);
  });

  content.addEventListener("click", function(e) {
    const mark = e.target.closest("mark.user-hl");
    if (mark) {
      const parent = mark.closest("[data-hl-key]");
      const text = mark.textContent;
      mark.replaceWith(document.createTextNode(text));
      if (parent) {
        parent.normalize();
        saveHighlightsForContainer(parent);
        const tid = parent.getAttribute("data-hl-key").split(":")[0];
        removeMarkedWord(tid, text);
      }
      popup.style.display = "none";
      toast("已取消高亮");
      return;
    }
  });

  let selTimeout;
  content.addEventListener("mouseup", function(e) {
    clearTimeout(selTimeout);
    selTimeout = setTimeout(() => showHlPopup(e), 10);
  });

  document.addEventListener("mousedown", function(e) {
    if (!popup.contains(e.target)) {
      popup.style.display = "none";
    }
  });

  popup.addEventListener("click", function() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) { popup.style.display = "none"; return; }
    const range = sel.getRangeAt(0);
    const container = range.commonAncestorContainer.nodeType === 3
      ? range.commonAncestorContainer.parentElement
      : range.commonAncestorContainer;
    const hlContainer = container.closest("[data-hl-key]");
    if (!hlContainer) { popup.style.display = "none"; return; }
    const text = sel.toString().trim();
    if (!text) { popup.style.display = "none"; return; }
    const mark = document.createElement("mark");
    mark.className = "user-hl";
    try {
      range.surroundContents(mark);
    } catch(ex) {
      mark.textContent = text;
      range.deleteContents();
      range.insertNode(mark);
    }
    sel.removeAllRanges();
    hlContainer.normalize();
    saveHighlightsForContainer(hlContainer);
    const tid = hlContainer.getAttribute("data-hl-key").split(":")[0];
    addMarkedWord(tid, text);
    popup.style.display = "none";
    toast("已添加高亮");
  });
}

function showHlPopup(e) {
  const popup = document.getElementById("hlPopup");
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.rangeCount === 0) { popup.style.display = "none"; return; }
  const text = sel.toString().trim();
  if (!text) { popup.style.display = "none"; return; }
  const range = sel.getRangeAt(0);
  const container = range.commonAncestorContainer.nodeType === 3
    ? range.commonAncestorContainer.parentElement
    : range.commonAncestorContainer;
  if (!container.closest("[data-hl-key]")) { popup.style.display = "none"; return; }
  const rect = range.getBoundingClientRect();
  popup.style.left = (rect.left + rect.width / 2 - 40) + "px";
  popup.style.top = (rect.top - 36) + "px";
  popup.style.display = "block";
}

// ===== MARKED WORDS PAGE =====
let mwActiveTab = "words";
let mwActiveGroup = "全部";
let mwSelectedSet = new Set();
let mwOpenDropdown = -1;

function showMarkedWords(bookId, topicId) {
  state.view = "markedWords";
  state.bookId = bookId;
  state.topicId = topicId;
  mwSelectedSet.clear();
  mwOpenDropdown = -1;
  renderSidebar();
  renderMarkedWordsPage();
}

function renderMarkedWordsPage() {
  const bookId = state.bookId, topicId = state.topicId;
  const topic = getTopic(bookId, topicId);
  if (!topic) return;
  const mwt = getMwTopic(topicId);
  $breadcrumb().innerHTML = '<span>' + topic.title + '</span> / 标记词';
  $topbarActions().innerHTML = '';
  let html = '<div style="max-width:1100px;margin:0 auto">';
  html += '<div class="mw-tab-bar">';
  html += '<div class="mw-tab' + (mwActiveTab === "words" ? " active" : "") + '" onclick="mwSwitchTab(\'words\')">' + icon("tag") + ' 标记词 (' + mwt.words.length + ')</div>';
  html += '<div class="mw-tab' + (mwActiveTab === "records" ? " active" : "") + '" onclick="mwSwitchTab(\'records\')">' + icon("listChecks") + ' 练习记录</div>';
  html += '</div>';

  if (mwActiveTab === "words") {
    html += renderMwWordsTab(mwt, bookId, topicId);
  } else {
    html += renderMwRecordsTab(mwt, bookId, topicId);
  }
  html += '</div>';
  $content().innerHTML = html;

  document.addEventListener("click", closeMwDropdowns, true);
}

function mwSwitchTab(tab) {
  mwActiveTab = tab;
  renderMarkedWordsPage();
}

function renderMwWordsTab(mwt, bookId, topicId) {
  let html = '';
  html += '<div class="mw-topbar">';
  html += '<div class="mw-group-tabs">';
  html += '<div class="mw-group-tab' + (mwActiveGroup === "全部" ? " active" : "") + '" onclick="mwSwitchGroup(\'全部\')">全部 (' + mwt.words.length + ')</div>';
  mwt.groups.forEach(g => {
    const cnt = mwt.words.filter(w => w.group === g).length;
    const esc = g.replace(/'/g, "\\'");
    html += '<div class="mw-group-tab' + (mwActiveGroup === g ? " active" : "") + '" onclick="mwSwitchGroup(\'' + esc + '\')" oncontextmenu="event.preventDefault();mwDeleteGroup(\'' + esc + '\')">' + g + ' (' + cnt + ')</div>';
  });
  html += '<div class="mw-group-tab add-grp" onclick="mwAddGroup()">+ 新建分组</div>';
  html += '</div>';

  const filtered = mwActiveGroup === "全部" ? mwt.words : mwt.words.filter(w => w.group === mwActiveGroup);
  const allChecked = filtered.length > 0 && filtered.every(w => mwSelectedSet.has(w.en));

  html += '<div class="mw-actions">';
  html += '<label><input type="checkbox" ' + (allChecked ? 'checked' : '') + ' onchange="mwToggleAll(this.checked)" style="accent-color:#e8520e"> 全选</label>';
  html += '<button class="btn btn-primary" onclick="mwStartPractice()" ' + (mwSelectedSet.size === 0 ? 'disabled style="opacity:.5;cursor:not-allowed"' : '') + '>' + icon("pencil") + ' 听写 (' + mwSelectedSet.size + ')</button>';
  html += '</div></div>';

  if (mwt.words.length === 0) {
    html += '<div class="mw-empty"><div class="mw-empty-icon">' + icon("tag", 40) + '</div>';
    html += '<h3>暂无标记词</h3><p>在背诵模式中选中文本并点击高亮按钮，词会自动出现在这里</p></div>';
    return html;
  }

  if (filtered.length === 0) {
    html += '<div class="mw-empty"><div class="mw-empty-icon">' + icon("tag", 40) + '</div>';
    html += '<h3>该分组暂无词</h3><p>可以将其他分组的词移动到这里</p></div>';
    return html;
  }

  html += '<div class="mw-grid">';
  filtered.forEach((w, i) => {
    const globalIdx = mwt.words.indexOf(w);
    const checked = mwSelectedSet.has(w.en);
    html += '<div class="mw-card' + (checked ? ' selected' : '') + '" data-mw-idx="' + globalIdx + '">';
    html += '<div class="mw-card-top">';
    html += '<input type="checkbox" class="mw-card-check" ' + (checked ? 'checked' : '') + ' onchange="mwToggleWord(\'' + w.en.replace(/'/g, "\\'") + '\', this.checked)">';
    html += '<button class="mw-card-menu" onclick="event.stopPropagation();mwToggleDropdown(' + globalIdx + ')">' + icon("moreV", 16) + '</button>';
    html += '</div>';
    html += '<div class="mw-card-en">' + w.en + '</div>';
    if (w.cn) {
      html += '<div class="mw-card-cn" onclick="mwEditCn(' + globalIdx + ')" title="点击编辑中文">' + w.cn + '</div>';
    } else {
      html += '<div class="mw-card-cn mw-card-cn-empty" onclick="mwEditCn(' + globalIdx + ')" title="点击编辑中文">点击添加中文释义</div>';
    }
    if (mwOpenDropdown === globalIdx) {
      html += '<div class="mw-dropdown">';
      mwt.groups.forEach(g => {
        if (g !== w.group) {
          html += '<div class="mw-dropdown-item" onclick="mwMoveWord(' + globalIdx + ',\'' + g.replace(/'/g, "\\'") + '\')">' + icon("arrowRight", 14) + ' 移至「' + g + '」</div>';
        }
      });
      html += '<div class="mw-dropdown-divider"></div>';
      html += '<div class="mw-dropdown-item danger" onclick="mwDeleteWord(' + globalIdx + ')">' + icon("trash", 14) + ' 删除</div>';
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function mwSwitchGroup(g) {
  mwActiveGroup = g;
  mwSelectedSet.clear();
  renderMarkedWordsPage();
}

function mwAddGroup() {
  const name = prompt("请输入新分组名称:");
  if (!name || !name.trim()) return;
  const mwt = getMwTopic(state.topicId);
  if (mwt.groups.includes(name.trim())) { toast("分组已存在"); return; }
  mwt.groups.push(name.trim());
  saveMarkedWords();
  renderMarkedWordsPage();
}

function mwDeleteGroup(g) {
  if (g === "未分组") { toast("默认分组不可删除"); return; }
  if (!confirm("确定删除分组「" + g + "」？该组中的词将移回「未分组」。")) return;
  const mwt = getMwTopic(state.topicId);
  mwt.words.forEach(w => { if (w.group === g) w.group = "未分组"; });
  mwt.groups = mwt.groups.filter(x => x !== g);
  saveMarkedWords();
  if (mwActiveGroup === g) mwActiveGroup = "全部";
  renderMarkedWordsPage();
  toast("分组「" + g + "」已删除");
}

function mwToggleAll(checked) {
  const mwt = getMwTopic(state.topicId);
  const filtered = mwActiveGroup === "全部" ? mwt.words : mwt.words.filter(w => w.group === mwActiveGroup);
  if (checked) {
    filtered.forEach(w => mwSelectedSet.add(w.en));
  } else {
    filtered.forEach(w => mwSelectedSet.delete(w.en));
  }
  renderMarkedWordsPage();
}

function mwToggleWord(en, checked) {
  if (checked) mwSelectedSet.add(en);
  else mwSelectedSet.delete(en);
  renderMarkedWordsPage();
}

function mwToggleDropdown(idx) {
  mwOpenDropdown = mwOpenDropdown === idx ? -1 : idx;
  renderMarkedWordsPage();
}

function closeMwDropdowns(e) {
  if (mwOpenDropdown >= 0 && !e.target.closest('.mw-card-menu') && !e.target.closest('.mw-dropdown')) {
    mwOpenDropdown = -1;
    renderMarkedWordsPage();
  }
}

function mwMoveWord(idx, targetGroup) {
  const mwt = getMwTopic(state.topicId);
  if (mwt.words[idx]) {
    mwt.words[idx].group = targetGroup;
    saveMarkedWords();
  }
  mwOpenDropdown = -1;
  renderMarkedWordsPage();
  toast("已移至「" + targetGroup + "」");
}

function mwDeleteWord(idx) {
  const mwt = getMwTopic(state.topicId);
  if (mwt.words[idx]) {
    const en = mwt.words[idx].en;
    mwt.words.splice(idx, 1);
    mwSelectedSet.delete(en);
    saveMarkedWords();
  }
  mwOpenDropdown = -1;
  renderMarkedWordsPage();
  renderSidebar();
  toast("已删除");
}

function mwEditCn(idx) {
  const mwt = getMwTopic(state.topicId);
  const w = mwt.words[idx];
  if (!w) return;
  const card = document.querySelector('[data-mw-idx="' + idx + '"]');
  if (!card) return;
  const cnEl = card.querySelector('.mw-card-cn');
  if (!cnEl) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'mw-card-cn-input';
  input.value = w.cn || '';
  input.placeholder = '输入中文释义';
  cnEl.replaceWith(input);
  input.focus();
  input.select();
  const save = () => {
    w.cn = input.value.trim();
    saveMarkedWords();
    renderMarkedWordsPage();
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); save(); } });
}

// ===== MARKED WORDS DICTATION PRACTICE =====
let mwPracticeWords = [];
let mwPracticeIdx = 0;
let mwPracticeCorrect = 0;
let mwPracticeWrong = [];
let mwPracticeShowingAnswer = false;

function mwStartPractice() {
  const mwt = getMwTopic(state.topicId);
  const words = mwt.words.filter(w => mwSelectedSet.has(w.en) && w.cn);
  const noCn = mwt.words.filter(w => mwSelectedSet.has(w.en) && !w.cn);
  if (noCn.length > 0) {
    toast("有 " + noCn.length + " 个词缺少中文释义，已跳过");
  }
  if (words.length === 0) {
    toast("没有可以听写的词（需要有中文释义）");
    return;
  }
  mwPracticeWords = words.slice();
  mwPracticeIdx = 0;
  mwPracticeCorrect = 0;
  mwPracticeWrong = [];
  mwPracticeShowingAnswer = false;
  state.view = "mwPractice";
  renderSidebar();
  renderMwPracticeView();
}

function mwStartPracticeFromRecord(wrongWords) {
  const mwt = getMwTopic(state.topicId);
  const words = [];
  wrongWords.forEach(en => {
    const found = mwt.words.find(w => w.en === en);
    if (found && found.cn) words.push(found);
  });
  if (words.length === 0) { toast("没有可以听写的错词"); return; }
  mwPracticeWords = words;
  mwPracticeIdx = 0;
  mwPracticeCorrect = 0;
  mwPracticeWrong = [];
  mwPracticeShowingAnswer = false;
  state.view = "mwPractice";
  renderSidebar();
  renderMwPracticeView();
}

function renderMwPracticeView() {
  const bookId = state.bookId, topicId = state.topicId;
  if (mwPracticeIdx >= mwPracticeWords.length) {
    renderMwPracticeResult();
    return;
  }
  const w = mwPracticeWords[mwPracticeIdx];
  const total = mwPracticeWords.length;
  const pct = Math.round(mwPracticeIdx / total * 100);
  $breadcrumb().innerHTML = '<span>标记词听写</span>';
  $topbarActions().innerHTML = '<button onclick="showMarkedWords(\'' + bookId + "','" + topicId + "')\">" + '退出练习</button>';

  let html = '<div class="practice-wrap">';
  html += '<div class="practice-card">';
  html += '<div class="practice-group-label">标记词听写 · 第 ' + (mwPracticeIdx + 1) + ' / ' + total + ' 个</div>';
  html += '<div class="practice-chinese">' + w.cn + '</div>';
  html += '<div class="practice-answer-reveal" id="mwAnswerReveal">' + w.en + '</div>';
  html += '<div class="practice-input-wrap">';
  html += '<input type="text" class="practice-input" id="mwInput" placeholder="输入英文..." autocomplete="off" onkeydown="if(event.key===\'Enter\')mwCheckAnswer()">';
  html += '<button class="hint-btn" id="mwHintBtn" onclick="speak(\'' + w.en.replace(/'/g, "\\'") + '\');this.classList.add(\'playing\');setTimeout(()=>this.classList.remove(\'playing\'),1500)" title="朗读提示">' + icon("volume", 20) + '</button>';
  html += '</div>';
  html += '<div class="practice-feedback" id="mwFeedback"></div>';
  html += '<div class="practice-skip" onclick="mwSkip()">跳过</div>';
  html += '</div></div>';
  html += '<div class="practice-progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div><div class="progress-text">' + mwPracticeIdx + ' / ' + total + '</div></div>';
  $content().innerHTML = html;
  document.getElementById("mwInput").focus();
}

function mwCheckAnswer() {
  if (mwPracticeShowingAnswer) return;
  const w = mwPracticeWords[mwPracticeIdx];
  const input = document.getElementById("mwInput");
  const val = input.value.trim();
  if (!val) return;
  const feedback = document.getElementById("mwFeedback");
  if (phrasesMatch(val, w.en)) {
    input.classList.add("correct");
    input.disabled = true;
    feedback.className = "practice-feedback correct";
    feedback.textContent = "✓ 正确!";
    mwPracticeCorrect++;
    setTimeout(() => { mwPracticeIdx++; mwPracticeShowingAnswer = false; renderMwPracticeView(); }, 800);
  } else {
    input.classList.add("wrong");
    input.disabled = true;
    feedback.className = "practice-feedback wrong";
    feedback.textContent = "✗ 再试一次";
    speak(w.en);
    if (!mwPracticeWrong.includes(w.en)) mwPracticeWrong.push(w.en);
    const reveal = document.getElementById("mwAnswerReveal");
    reveal.classList.add("show");
    mwPracticeShowingAnswer = true;
    setTimeout(() => {
      reveal.classList.remove("show");
      input.classList.remove("wrong");
      input.disabled = false;
      input.value = "";
      input.focus();
      feedback.textContent = "";
      mwPracticeShowingAnswer = false;
    }, 5000);
  }
}

function mwSkip() {
  const w = mwPracticeWords[mwPracticeIdx];
  if (!mwPracticeWrong.includes(w.en)) mwPracticeWrong.push(w.en);
  mwPracticeIdx++;
  mwPracticeShowingAnswer = false;
  renderMwPracticeView();
}

function renderMwPracticeResult() {
  const bookId = state.bookId, topicId = state.topicId;
  const total = mwPracticeWords.length;
  const correct = mwPracticeCorrect;
  const score = total > 0 ? Math.round(correct / total * 100) : 0;

  const mwt = getMwTopic(topicId);
  const now = new Date();
  const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  mwt.records.push({ date: dateStr, total: total, correct: correct, wrongWords: mwPracticeWrong.slice() });
  saveMarkedWords();

  $breadcrumb().innerHTML = '<span>听写结果</span>';
  $topbarActions().innerHTML = '';
  let html = '<div class="completion-wrap">';
  html += '<div class="completion-icon">' + icon("trophy", 64) + '</div>';
  html += '<div class="completion-title">听写完成！</div>';
  html += '<div class="completion-subtitle">共 ' + total + ' 个标记词</div>';
  html += '<div class="completion-stats">';
  html += '<div class="stat-box"><div class="stat-num">' + score + '%</div><div class="stat-label">正确率</div></div>';
  html += '<div class="stat-box"><div class="stat-num">' + correct + '</div><div class="stat-label">正确</div></div>';
  html += '<div class="stat-box"><div class="stat-num">' + mwPracticeWrong.length + '</div><div class="stat-label">错误</div></div>';
  html += '</div>';
  if (mwPracticeWrong.length > 0) {
    html += '<div style="margin-bottom:20px;text-align:left;max-width:500px;width:100%">';
    html += '<div style="font-size:14px;font-weight:600;margin-bottom:8px;color:#ef4444">错误词汇：</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    mwPracticeWrong.forEach(en => {
      html += '<span style="background:#fef2f2;color:#ef4444;padding:4px 12px;border-radius:6px;font-size:13px">' + en + '</span>';
    });
    html += '</div></div>';
  }
  html += '<div class="card-actions">';
  if (mwPracticeWrong.length > 0) {
    html += '<button class="btn btn-primary" onclick="mwRetryWrong()">重听错词</button>';
  }
  html += '<button class="btn btn-secondary" onclick="showMarkedWords(\'' + bookId + "','" + topicId + "')\">" + '返回标记词</button>';
  html += '</div></div>';
  $content().innerHTML = html;
}

function mwRetryWrong() {
  mwStartPracticeFromRecord(mwPracticeWrong.slice());
}

// ===== MARKED WORDS RECORDS TAB =====
function renderMwRecordsTab(mwt, bookId, topicId) {
  let html = '';
  if (mwt.records.length === 0) {
    html += '<div class="mw-record-empty">暂无练习记录。选择标记词开始听写后，记录会出现在这里。</div>';
    return html;
  }
  html += '<table class="mw-record-table"><thead><tr>';
  html += '<th>日期</th><th>总词数</th><th>正确</th><th>正确率</th><th>错误词汇</th><th>操作</th>';
  html += '</tr></thead><tbody>';
  const records = mwt.records.slice().reverse();
  records.forEach((r, ri) => {
    const realIdx = mwt.records.length - 1 - ri;
    const pct = r.total > 0 ? Math.round(r.correct / r.total * 100) : 0;
    const pctColor = pct >= 80 ? '#22c55e' : pct >= 50 ? '#e8520e' : '#ef4444';
    html += '<tr>';
    html += '<td>' + r.date + '</td>';
    html += '<td>' + r.total + '</td>';
    html += '<td>' + r.correct + '</td>';
    html += '<td style="font-weight:600;color:' + pctColor + '">' + pct + '%</td>';
    html += '<td><div class="wrong-list">';
    if (r.wrongWords.length === 0) {
      html += '<span style="color:#22c55e;font-size:13px">全部正确</span>';
    } else {
      r.wrongWords.forEach(w => { html += '<span class="wrong-tag">' + w + '</span>'; });
    }
    html += '</div></td>';
    html += '<td>';
    if (r.wrongWords.length > 0) {
      html += '<button class="btn btn-primary btn-sm" onclick="mwRetryFromRecord(' + realIdx + ')">重听错词</button>';
    }
    html += '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function mwRetryFromRecord(recordIdx) {
  const mwt = getMwTopic(state.topicId);
  const record = mwt.records[recordIdx];
  if (!record || record.wrongWords.length === 0) return;
  mwStartPracticeFromRecord(record.wrongWords);
}

// ===== RESET PROGRESS =====
function resetProgress() {
  if (confirm("确定要清除所有学习进度吗？此操作不可撤销。")) {
    progress = {phrases:{},sentences:{},paragraphs:{}};
    saveProgress();
    goHome();
    toast("进度已重置");
  }
}

renderSidebar();
renderDashboard();
