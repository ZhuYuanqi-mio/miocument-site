    title: "教育",
    groups: [
      {phrases:[{cn:"掌握专业知识",en:"Acquire specialist knowledge"},{cn:"生活在知识驱动的世界中",en:"Live in a knowledge-driven world"}],sentenceCn:"年轻人掌握专业知识非常重要。他们生活在一个知识驱动的世界中。",sentenceEn:"Young people need to acquire specialized knowledge. They live in a knowledge-driven world."},
      {phrases:[{cn:"专注于主科",en:"Focus on core subjects"},{cn:"确保进入顶尖大学",en:"Ensure admission to top universities"}],sentenceCn:"老师通常希望学生专注于主科。这有助于他们确保进入顶尖大学。",sentenceEn:"Teachers usually expect students to focus on core subjects. This can help them secure admission to top universities."},
      {phrases:[{cn:"参加大学课程",en:"Attend university courses"},{cn:"使用先进工具",en:"Use advanced tools"},{cn:"拥有扎实的教育背景",en:"Have a strong educational background"},{cn:"解决复杂问题",en:"Solve complex problems"}],sentenceCn:"上大学的课程可以让人们更好地了解特定行业的先进工具和技术。这种教育背景使他们能够在工作中更有效地解决复杂问题。",sentenceEn:"Attending university courses enables people to gain a better understanding of advanced tools and techniques in a specific industry. This educational background enables them to solve complex problems in their workplace more effectively."},
      {phrases:[{cn:"完成大学作业",en:"Do university assignments"},{cn:"找资料",en:"Conduct research"},{cn:"提高解决问题的能力",en:"Improve problem-solving abilities"}],sentenceCn:"完成大学作业通常需要学生对不熟悉的话题找资料。这可以帮助他们提高解决问题的能力。",sentenceEn:"Conducting research on unfamiliar subjects is required for students to complete university assignments. This can help them improve their problem-solving abilities."},
      {phrases:[{cn:"提供全面的教育",en:"Provide a well-rounded education"},{cn:"成长为全面发展的人",en:"Grow into a well-rounded individual"}],sentenceCn:"许多学校如今致力于提供全面的教育。家长希望他们的孩子成长为全面发展的人。",sentenceEn:"Many schools nowadays aim to provide a well-rounded education. Parents want their children to grow into well-rounded individuals."},
      {phrases:[{cn:"参加课外活动",en:"Participate in extracurricular activities"},{cn:"培养丰富的技能",en:"Develop a broad range of skills"}],sentenceCn:"学生参加各种课外活动很重要。这有助于他们培养丰富的技能。",sentenceEn:"It\\'s important for students to participate in various extracurricular activities. This helps them develop a broad range of skills."},
      {phrases:[{cn:"培养非学术技能",en:"Develop non-academic skills"},{cn:"适应快速变化的世界",en:"Adapt to a fast-changing world"}],sentenceCn:"学生今天培养非学术技能非常重要。这使他们能够适应快速变化的世界。",sentenceEn:"It\\'s crucial for students to develop non-academic skills today. This enables them to adapt to a fast-changing world."},
      {phrases:[{cn:"实习",en:"Do internships"},{cn:"获得实践经验",en:"Gain hands-on experience"},{cn:"做义务工作",en:"Do unpaid work"}],sentenceCn:"学生实习和做义务工作是有益的。这可以帮助他们获得实践经验。",sentenceEn:"It\\'s beneficial for students to do internships as well as unpaid work. This helps them gain hands-on experience."},
      {phrases:[{cn:"根据需求和水平定制课程",en:"Tailor courses to the needs and levels"},{cn:"提高参与度",en:"Improve engagement"}],sentenceCn:"如今学校建议老师根据学生的需求和水平来定制课程。这有助于提高学生的参与度。",sentenceEn:"Schools nowadays advise teachers to tailor their courses to the needs and skill levels of their students. This helps improve student engagement."},
      {phrases:[{cn:"学习喜欢的科目",en:"Study favorite subjects"},{cn:"发现天赋",en:"Discover talents"},{cn:"开发天赋",en:"Develop talents"}],sentenceCn:"越来越多的家长允许孩子学习他们喜欢的科目。这有助于他们发现和开发自己的天赋。",sentenceEn:"More and more parents nowadays allow their children to study their favorite subjects. This helps them discover and develop their personal talents."}
    ],
    paragraphs: [
      {title:"What rules should children follow at school in your country?",type:"part3",cn:"我认为大多数学校的规章制度都与学生的学业表现相关。这主要是因为我们生活在一个知识驱动的世界。孩子们必须掌握专门的知识，才能进入名牌大学，并在未来找到好工作。因此，学校期望学生遵守规章制度，专注于学习。",en:"I believe most school rules are related to students\\' academic performance. It\\'s primarily because we live in a knowledge-driven world. It\\'s crucial for children to acquire specialized knowledge to gain admission to renowned universities and secure good jobs in the future. That is why schools expect students to follow rules and focus on their studies, ensuring they excel academically. For instance, students are expected to attend classes on time, complete their daily assignments, and listen to teachers\\' instructions without disrupting the class. Additionally, in some schools, students are not allowed to bring electronic devices into classrooms to minimize distractions. These rules help students dedicate their time and energy to studying. This enables them to consolidate their knowledge and perform well in exams."},
      {title:"Do you think it\\'s necessary for students to spend more time on extracurricular activities?",type:"part3",cn:"我认为学生积极参与各种课外活动非常重要。在今天高度复杂又瞬息万变的世界中，成为全面发展的人才至关重要。仅仅拥有学术知识，技能和知识可能不足以应对现代生活的挑战。",en:"I believe it is very important for students to participate in various extracurricular activities. Developing into well-rounded individuals is crucial in today\\'s highly complex and ever-changing world, and academic knowledge alone may not always be enough to handle the challenges of modern life. By taking part in extracurricular activities, students can acquire diverse range of skills and abilities, enabling them to show resilience in challenging circumstances. For instance, playing sports can help them develop a positive mental attitude when facing challenges. Similarly, team sports can enhance their ability to work collaboratively and manage with others. These skills are invaluable in preparing young people for the challenges of the future."},
      {title:"What are the benefits of gaining work experience while studying?",type:"part3",cn:"我认为学生获得工作经验的主要好处是它有助于他们成长为全面发展的人。在当今竞争激烈的世界中，雇主对员工的期望很高。因此，学生获得实践经验至关重要。",en:"I believe the main benefit of gaining work experience for students is that it helps them grow into well-rounded individuals. In today\\'s highly competitive world, it is expected employers to be job-ready without requiring additional trainings. Therefore, it is crucial for students to gain practical experience. For instance, internships provide opportunities to develop practical skills such as using office equipment, communicating politely with clients, collaborating with colleagues, and abiding good general workplace practices, such as being punctual. With hands-on experience, students can transition seamlessly into the workplace. This significantly enhances their job prospects."},
      {title:"In some countries, there has been an increase in the number of parents who educate their children themselves at home instead of sending them to school. Do the advantages of home education outweigh its disadvantages?",type:"essay",cn:"在家教育可以使一些具有独特个性和天赋的孩子受益。另一方面，在家教育有时可能限制孩子的全面发展。",en:"Home education has become increasingly popular. It offers distinct advantages as well as drawbacks. Home schooling can benefit the development of some particularly advantaged children with unique particularity and talents that differ from the majority of students. Children educated at home can receive learning support from parents with similar learning styles, strengths, and weaknesses. This familiarity allows parents to tailor lessons, materials, and educational activities to the child\\'s learning, thereby enhancing confidence and maximizing outcomes. For example, children who are not naturally inclined towards studying math can be guided across gradually increasing, less mathematically stressful, more time-consuming activities step by step until they are ready for more complex activities. This level of personalization is unlikely to follow a fixed standardized curriculum that teachers typically offer due to time constraints, where they may be unable to give special attention to individual students. On the other hand, home education can sometimes limit children\\'s holistic development, as students may not have opportunities to attend diverse courses that help develop a wide range of skills and abilities. This is because learning in today\\'s world, where competition is fierce, is conducive to individuals equipped with diverse skills, which is the standard to stand out and succeed in the workplace. Parents typically are not of such expertise in all subjects, which can lead to a narrow scope of knowledge and insufficient preparation for their children. In conclusion, while home education may benefit some children, it can have negative effects on the majority by limiting their exposure to diverse learning experiences."},
      {title:"Today, more and more full-time university students focus on other activities rather than spend a lot of time studying. Some people think it is essential for university students to be involved in other activities. To what extent do you agree or disagree?",type:"essay",cn:"参加课外活动可以帮助学生成为全面发展的毕业生。另一方面，有理由建议一些大学生应该优先考虑学术任务。",en:"Some argue that university students should spend part of their time on non-academic activities rather than focusing solely on academic work. I partly agree with this view, although it\\'s not universally applicable. Engaging in extracurricular activities can help students become well-rounded graduates because they are equipped with a diverse range of skills and abilities. This view arises from the fact that in today\\'s intensely competitive and rapidly changing world, academic qualifications alone no longer guarantee job security, and people are expected to undertake diverse roles to achieve cost-saving benefits for employers. Beyond the lecture hall, students can join clubs on campus or engage in internships, part-time jobs, and volunteer work. These activities can help them sharpen skills such as decision-making, problem-solving, teamwork, and interpersonal skills essential for handling complex work relationships. On the other hand, it is reasonable to suggest that some university students should prioritize their academic tasks, as credentials and academic records are crucial in a knowledge-driven economy. This is especially true when rapid technological change has increased specialization and an in-depth knowledge of relevant subjects has become increasingly important. Students in fields like law, medicine, engineering, and science are expected to dedicate their time to studying diligently. High grades can significantly enhance employability, considering that a large number of professions require specialized knowledge developed over years. In conclusion, while I partly agree that involvement in non-academic activities is beneficial for university students, this may not apply universally."},
      {title:"Schools should concentrate on teaching students the academic subjects that will be useful for their future careers. Subjects such as music and sports are not useful. To what extent do you agree or disagree?",type:"essay",cn:"专注于职业导向的教育是可以理解的。另一方面，在一些教育系统中，音乐和体育等非学术科目逐渐获得了重要性和普及性。",en:"It has been argued that subjects that improve job prospects should be prioritized at school and university, while other subjects, such as music and sports, are considered less useful. I partly agree with this view, although in some cases, this may not be entirely true. Focusing on career-oriented education is understandable, considering that young people today compete in a knowledge-based economy. Technological advancements have increased the specialization of many jobs, requiring a strong grasp of skills, techniques, and cutting-edge devices or equipment used in different industries. To secure employment, young people are expected to dedicate most of their study time to academic subjects such as mathematics, which lay a solid foundation for future studies and help them gain admission to universities. By comparison, non-academic subjects, such as music and sports, are often perceived as extracurricular activities that help students take a break from the rigour of their academic routines. On the other hand, in some educational systems, non-academic subjects such as music and sports have gradually gained importance and popularity, as educators recognize their value in helping young people develop diverse skills and resilience in a fast-changing world. This argument is based on the fact that technological innovations have accelerated the evolution of various industries worldwide, meaning that knowledge acquired at school does not necessarily guarantee a steady career throughout one\\'s lifetime. People are now expected to diversify their skill sets to prepare for different challenges and changes. In conclusion, I generally agree that prioritizing academic subjects and the relationship to career advancement is justified by technological progress. However, it is equally important to recognize the value of being well-rounded individuals."},
      {title:"Some people believe that a country benefits greatly with a high percentage of young people going to university, while others argue that it only leads to graduate unemployment. Discuss both views and give your opinion.",type:"essay",cn:"一些人持积极看法，认为受过良好教育的年轻人可以极大地促进国家进步。另一方面，越来越多的人上大学被认为是一种消极变化，因为它可能增加失业率。",en:"A high participation rate in tertiary education has been perceived by some people as the main cause of high youth unemployment. I partly agree with this view, although I think a large proportion of college-educated young people is also a positive change for a country\\'s development. Some people hold a positive view of this development, arguing that well-educated young people can greatly contribute to a country\\'s progress. The argument stems from the fact that countries now compete in a knowledge economy. Technological advancements have increased the specialization and complexity of each job. Young people who are educated at the university level can stay informed about the latest developments in their respective industries and integrate advanced techniques into their workplace. This can significantly improve productivity and offer their employers competitive advantages. On the other hand, the growing trend towards attending university has been perceived as a negative change because some people think it can increase unemployment. Their concern is rooted in the fact that universities have developed into diploma factories, with a main emphasis on acquiring theoretical knowledge rather than equipping young people with a diverse range of skills needed for their future careers. University graduates often discover a mismatch between the skills they possess and those demanded by employers, making it difficult for them to fit in. In conclusion, a country can benefit from a larger proportion of young people participating in tertiary education in terms of productivity and innovation. However, university courses may not always be well-designed to help young people overcome challenges in transitioning to the workforce."}
    ]
  },

    title: "外部因素",
    groups: [
      {phrases:[{cn:"外部世界",en:"external world"},{cn:"遵守规则",en:"follow rules"},{cn:"避免惩罚",en:"avoid punishment"}],sentenceCn:"外部世界对人的行为有着巨大的影响。人们倾向于小心翼翼地遵守规则以避免惩罚。",sentenceEn:"The external world has a huge influence on one\\'s behaviour. People tend to follow rules carefully to avoid punishment."},
      {phrases:[{cn:"学习社会规范",en:"learn social norms"},{cn:"观察行为",en:"observe behaviour"},{cn:"以特定方式行事",en:"behave in specific ways"}],sentenceCn:"人们试图通过观察他人的行为来学习社会规范。人们往往以特定方式行事以获得好的结果。",sentenceEn:"People try to learn social norms by observing other people\\'s behaviour. People tend to behave in specific ways to achieve positive outcomes."},
      {phrases:[{cn:"制定规则",en:"set rules"},{cn:"理解行为的界限",en:"understand the boundaries of behaviour"}],sentenceCn:"家长和老师会尝试制定规则。这些规则使孩子们能够理解行为的界限。",sentenceEn:"Parents and teachers attempt to set rules. These rules enable children to understand the boundaries of behaviour."},
      {phrases:[{cn:"表现好的行为",en:"behave well"},{cn:"获得正面认可",en:"receive positive recognition"},{cn:"获得奖励",en:"gain rewards"}],sentenceCn:"孩子们会表现好的行为并遵守规则。他们可能会获得正面认可并获得奖励。",sentenceEn:"Children tend to behave well and obey rules. They are likely to receive positive recognition and gain rewards."},
      {phrases:[{cn:"遵守校规",en:"follow school rules"},{cn:"取得优异成绩",en:"achieve high grades"}],sentenceCn:"对于学生来说，遵守校规是很重要的。这可以帮助他们取得优异成绩并赢得老师的表扬。",sentenceEn:"It is important for students to follow school rules. This can help them achieve high grades and earn praise from teachers."},
      {phrases:[{cn:"同伴压力",en:"peer pressure"},{cn:"遵守群体规范",en:"conform to group norms"},{cn:"获得社会认同",en:"gain social acceptance"}],sentenceCn:"同伴压力对孩子的行为有深远影响。孩子倾向于遵守群体规范以获得社会认同。",sentenceEn:"Peer pressure has a profound impact on children\\'s behaviour. Children tend to conform to group norms in order to gain social acceptance."},
      {phrases:[{cn:"树立好的榜样",en:"set positive examples"},{cn:"将他们视为榜样",en:"look up to them as role models"}],sentenceCn:"名人和父母为年轻一代树立好的榜样总是很重要的。孩子们会经常将他们视为榜样。",sentenceEn:"It is always important for celebrities and parents to set positive examples for younger generations. Children tend to look up to them as role models."},
      {phrases:[{cn:"奖励良好行为",en:"reward good behaviour"},{cn:"惩罚不良行为",en:"punish bad behaviour"},{cn:"培养适当的世界观",en:"develop appropriate worldviews"}],sentenceCn:"家长和老师奖励良好行为、惩罚不良行为是很重要的。这使孩子能够培养好习惯并形成适当的世界观。",sentenceEn:"It is important for parents and teachers to reward good behaviour and punish bad behaviour. This enables children to develop positive habits and form appropriate worldviews."},
      {phrases:[{cn:"违反规则",en:"break rules"},{cn:"出现行为问题",en:"behave poorly"},{cn:"进行管教",en:"impose discipline"},{cn:"让他们对自己的行为负责",en:"hold them accountable for their actions"}],sentenceCn:"有时孩子可能会违反规则并出现行为问题。有必要对他们进行管教，让他们对自己的行为负责。",sentenceEn:"Sometimes, children are likely to break rules and behave poorly. It is necessary to impose discipline and hold them accountable for their actions."},
      {phrases:[{cn:"在媒体露面",en:"appear in the media"},{cn:"模仿名人",en:"emulate celebrities"}],sentenceCn:"名人经常在媒体露面。孩子们经常试图模仿名人。",sentenceEn:"Celebrities often appear in the media frequently. Children often try to emulate celebrities."}
    ],
    paragraphs: [
      {title:"Who is most likely to influence young people\\'s decision-making?",type:"part3",cn:"我认为这很大程度上取决于年龄。人们的行为、习惯、生活方式和看法，很大程度上受到他们对特定行为或决定与其结果之间关系的理解的影响。年轻的时候，他们大部分时间都和父母在一起。他们倾向于遵循父母设定的规则以实现积极的结果。相比之下，随着年龄的增长，他们会受到老师、朋友、甚至媒体中的名人的影响。",en:"I think it really depends on age. People\\'s behavior, habits, lifestyles, and perceptions are heavily influenced by their understanding of the relationship between specific actions or decisions and their outcomes. When they are young, they spend most of their time with their parents. They tend to follow the rules set by their parents to achieve positive outcomes. For example, they may speak or behave in ways required by their parents in order to receive positive recognition or gain rewards, such as toys and games. Parents have significant influence on their decisions. In contrast, as they grow older, they are influenced by teachers, friends, or even charities and celebrities in the media. They tend to make decisions to gain social acceptance, such as earning praise from their peers."},
      {title:"Are the rules at school good or bad? Why?",type:"part3",cn:"我认为学校里的大部分规章制度都是有益的。人们的行为、习惯、生活方式和认知很大程度上受到他们对特定行为或决定与其结果之间关系的理解的影响。制定规则可以教导孩子们可接受行为的界限。",en:"I think the majority of rules in school are beneficial. People\\'s behavior, habits, lifestyles, and perceptions are heavily influenced by their understanding of the relationship between specific actions or decisions and their outcomes. Imposing rules can teach children the boundaries of acceptable behavior. They need to obey rules; otherwise, they have to face negative consequences. For example, if they are dishonest or not integrity, they will learn the value of honesty and integrity, as well as the importance of studying hard to achieve desirable grades and earn respect from others. By following these rules, they can develop good habits and establish appropriate worldviews. They are more likely to receive social recognition and acceptance in the future."},
      {title:"Is it important for children to have a role model?",type:"part3",cn:"是的，绝对重要。人们的行为、习惯、生活方式和认知很大程度上受到他们对特定行为或决定与其结果之间关系的理解的影响。他们通过观察他人的行为来获得这些知识。榜样人物教会年轻人向往的行为，并以类似的方式行事。",en:"Yes, it is definitely important to have a role model. People\\'s behavior, habits, lifestyles, and perceptions are heavily influenced by their understanding of the relationship between specific actions or decisions and their outcomes. They acquire this knowledge by observing other people\\'s actions. They tend to act in certain ways to achieve perceived positive outcomes while avoiding negative ones. Role models teach desirable behavior and highlight the long-term benefits of sticking to a particular course of action. This can motivate young people to behave similarly, increasing their chances of success. For example, many renowned athletes and celebrities exhibit such qualities, such as work ethic, perseverance, and positive thinking, all of which contribute to a successful career. Children can possibly achieve success in their own careers by emulating these celebrities."},
      {title:"Parents or teachers play an important role in children\\'s development, agree or not?",type:"part3",cn:"我认为父母和老师在孩子的成长过程中都发挥着至关重要的角色，只是侧重点会随着年龄而变化。当孩子年幼时，父母通过奖励和惩罚、树立榜样来影响和塑造孩子的行为。相比之下，随着孩子长大，老师往往变得更有影响力。",en:"I think both parents and teachers play a crucial role in children\\'s development, but their roles and emphasis change with age. People\\'s behavior, habits, lifestyles, and perceptions are heavily influenced by their understanding of the relationship between specific actions or decisions and their outcomes. When children are young, parents influence and shape their behavior by setting examples, enforcing rules, rewarding good behavior, and punishing bad behavior. For example, if parents often cook with their children, the children are likely to develop such habits from a young age. In contrast, as children grow older, teachers tend to become more influential because children spend a lot of time at school. They need to follow the rules set by teachers, such as attaining high grades, which can benefit their future."},
      {title:"Detailed description of crimes on newspapers and TV can have bad consequences on society, so this kind of information should be restricted on media. To what extent do you agree or disagree?",type:"essay",cn:"犯罪报道应在某些情况下受到限制或审查，因为它可能导致模仿犯罪。另一方面，对媒体报道施加限制并不总是有益的，因为它可以帮助人们防范犯罪。",en:"There are some people arguing that the report on crimes in the media should be curtailed due to the potential negative consequences for the entire society. I partly agree with this view, although there are cases where the opposite holds true. The coverage of crime should be restricted or even censored in certain cases, as it can lead to copycat crimes. This is mainly because the media serves as a primary source of information, showing viewers the outcomes of specific actions and influencing their decisions to imitate such behavior. A detailed account of a crime can provide individuals with criminal intent a step-by-step guide for breaking the law, increasing their confidence in succeeding without being caught. Additionally, such reports may even motivate individuals to commit illegal acts for perceived rewards, such as a sense of excitement, an outlet for negative emotions, or the prospect of gaining media attention. On the other hand, it is reasonable to suggest that imposing restrictions on media coverage is not always beneficial, as it can help people take precautions against crime. It is true that people nowadays lead hectic lives and are not fully aware of all the changes in the external world. Media coverage of certain crimes can raise awareness, as governments can use high-profile crimes as specific examples in their awareness campaigns to safeguard law-abiding citizens from harm. In conclusion, I agree with the perspective that restricting media reports on certain crimes is necessary, although I also acknowledge that this may not be the case in other circumstances."},
      {title:"Nowadays young people overly admire media and sports celebrities. Do you think it is a positive or negative development?",type:"essay",cn:"崇拜名人可以对孩子和年轻一代产生积极影响，因为他们将这些名人视为榜样并努力效仿。另一方面，崇拜名人可能对年轻人产生消极影响，因为他们可能模仿这些名人的一些消极习惯和行为。",en:"It is not unusual nowadays for many young people to be obsessed with celebrities, either famous actors or sport personalities. I think this trend can have its positive effects despite its drawback. Admiring famous entertainers and sports celebrities can have a positive effect on children and younger generations because they see these celebrities as role models and make an effort to emulate them. This stems from the frequent media appearances of celebrities, often due to their physical attractiveness and distinguished careers. As a result, young people are motivated by the idea that achieving similar success can gain them widespread attention and recognition, which can boost their self-esteem tremendously and allow them to lead fulfilling lives. Therefore, young people invest time and effort into analyzing the qualities that contribute to these celebrities\\' achievements. They strive to emulate similar qualities in their own lives, such as perseverance, hard work, punctuality, and optimism when facing challenges and adverse conditions, until they achieve their own success. On the other hand, admiring celebrities can have a negative effect on young people because they may copy some of the negative habits and behaviors of these celebrities. This tendency is rooted in the fact that young people often see celebrities as public idols and believe that whatever they do is acceptable social behavior that can win approval and admiration. They sometimes perceive inappropriate behavior by celebrities as a form of self-expression and mistakenly think that rebelling against social norms contributes to these celebrities\\' achievements. As a result, they may mimic harmful behaviors such as alcoholism, drug use, verbal abuse, and spending money lavishly, which can have devastating effects on their lives. In conclusion, I believe that viewing famous actors and athletes as role models can inspire positive behavior in young people, although it may have negative effects in certain cases."},
      {title:"A family has a great influence on children\\'s development, but the influence outside the home plays a bigger part in children\\'s life. To what extent do you agree or disagree?",type:"essay",cn:"对于大多数孩子来说，家庭仍然是对他们发展影响最大的因素。另一方面，随着孩子长大，家庭以外的影响，如同龄人和老师，往往对他们的发展产生越来越大的影响。",en:"It is sometimes believed that environmental factors outside the family have a greater impact on children\\'s development than the family itself. I disagree with this perspective, although it can be true in certain cases. For the majority of children, family remains the greatest influence on their development, primarily because children rely heavily on their parents for financial, physical, and emotional support, and they tend to follow their parents\\' examples and instructions closely. This argument is convincing, as children, particularly younger ones, have not yet reached an age where they can achieve financial independence or make significant life decisions. Spending the majority of their time at home, especially before attending school, children behave in ways that align with their parents\\' expectations to gain a sense of security and emotional attachment. Additionally, a family\\'s financial situation plays a critical role in shaping the opportunities available to children, which, in turn, influence their overall development. On the other hand, as children grow older, influences from outside the family, such as peers and teachers, tend to have a growing impact on their development, particularly in shaping their sense of identity. This point is valid because humans, as social creatures, place a high value on social recognition and the validation they receive from others. Adolescents, in particular, are susceptible to peer pressure and often exhibit behaviors aimed at gaining acceptance and avoiding social exclusion. In conclusion, I would argue that for most children, the family plays a more significant role in shaping their development. However, in certain contexts, particularly as children grow older, external factors beyond the home environment can have a stronger influence."}
    ]
  }
  ]

    groups: [
      {phrases:[{cn:"经济变得繁荣",en:"become prosperous"},{cn:"保护环境",en:"protect the environment"}],sentenceCn:"各国已经变得富有，有足够的经济能力来保护环境。",sentenceEn:"Countries have become prosperous. They are financially capable of protecting the environment."},
      {phrases:[{cn:"优先发展经济",en:"prioritise economic growth"},{cn:"造成环境破坏",en:"cause environmental damage"}],sentenceCn:"一些国家选择优先发展经济。制造业等产业的发展会对环境造成破坏。",sentenceEn:"Some countries prioritise economic growth. The development of industries such as manufacturing can cause damage to the environment."},
      {phrases:[{cn:"采用环保技术",en:"adopt eco-friendly technology"},{cn:"使用可再生能源",en:"use renewable energy sources"},{cn:"减少温室气体排放",en:"reduce greenhouse gas emissions"}],sentenceCn:"采用环保技术非常重要。使用可再生能源有助于减少温室气体排放。",sentenceEn:"It is important to adopt eco-friendly technology. The use of renewable energy sources helps reduce greenhouse gas emissions."},
      {phrases:[{cn:"推广电动汽车",en:"promote electric cars"},{cn:"减少汽车尾气排放",en:"reduce car emissions"},{cn:"缓解空气污染",en:"mitigate air pollution"}],sentenceCn:"推广电动汽车非常重要。这有助于减少汽车尾气排放和缓解空气污染。",sentenceEn:"It is important to promote electric cars. This helps reduce car emissions and mitigate air pollution."},
      {phrases:[{cn:"全球变暖",en:"global warming"},{cn:"极端天气事件",en:"extreme weather events"}],sentenceCn:"全球变暖对世界造成了毁灭性的影响。极端天气事件变得更加频繁。",sentenceEn:"Global warming has a devastating effect on the world. Extreme weather events have become frequent."},
      {phrases:[{cn:"有环保意识",en:"become environmentally conscious"},{cn:"采用环保科技",en:"adopt green technology"}],sentenceCn:"人们已经变得更有环保意识，他们积极采用环保科技。",sentenceEn:"People have become environmentally conscious. They play an active role in adopting green technology."},
      {phrases:[{cn:"购买环保产品",en:"purchase environmentally-friendly products"},{cn:"购买节能电器",en:"purchase energy-efficient appliances"},{cn:"严格的环境法",en:"strict environmental laws"},{cn:"践行绿色生活",en:"go green"},{cn:"以环保方式处理废弃物",en:"dispose of waste in an environmentally responsible way"}],sentenceCn:"补贴鼓励消费者购买环保产品，如高效节能电器。严格的环保法律促使企业践行绿色生活，比如以环保方式处理废弃物。",sentenceEn:"Subsidies encourage consumers to purchase environmentally-friendly products, such as energy-efficient appliances. Strict environmental laws prompt businesses to go green, such as disposing of waste in an environmentally responsible way."},
      {phrases:[{cn:"保护生物多样性",en:"preserve biodiversity"},{cn:"保护野生动物",en:"protect wildlife"},{cn:"维持生态平衡",en:"maintain the ecological balance"}],sentenceCn:"许多国家现在认为保护生物多样性非常重要。保护野生动物有助于维持生态平衡。",sentenceEn:"Many countries now consider it important to preserve biodiversity. Protection of wildlife helps maintain the ecological balance."},
      {phrases:[{cn:"保护自然栖息地",en:"protect the natural habitat"},{cn:"造成栖息地破坏",en:"cause habitat destruction"}],sentenceCn:"保护野生动物的自然栖息地非常重要。人类活动（如住房开发和石油钻探）导致了栖息地破坏。",sentenceEn:"It is important to protect the natural habitat of wild species. Human activity such as housing development and oil drilling has led to habitat destruction."},
      {phrases:[{cn:"灭绝",en:"become extinct"}],sentenceCn:"动物在生态系统中起着关键作用。某些物种的灭绝会对某些植物的生存产生连锁影响。",sentenceEn:"Animals play a critical role in the ecosystem. The extinction of some species can have a knock-on effect on the survival of certain plants."}
    ],
    paragraphs: [
      {title:"Are wild animals easy to spot in your country?",type:"part3",cn:"在一些城市，现在比以往任何时候都更容易观察到野生动物。这主要是因为国家变得更加繁荣，许多城市和地区现在有财力来保护自然环境及其野生动物。人们也越来越意识到保护野生动物的重要性，并采取了各种措施来保护野生动物的自然栖息地。",en:"In some cities, it is now easier than ever to observe wildlife. This is mainly because the country has become more prosperous, and many cities and regions now have the financial resources to protect the natural environment and its wildlife. People have also become increasingly aware of the importance of conserving wildlife and have implemented various measures to protect the natural habitats of wild animals. As a result, the populations of some wild animals have been successfully restored. For example, many regions have established nature reserves and launched afforestation programs. They have also enacted laws to punish the trading and poaching of animals. That\\'s why many people visiting natural attractions can now easily spot wildlife, such as monkeys, snakes, boars, or even tigers."},
      {title:"Can technology help tackle some environmental problems?",type:"part3",cn:"是的，我认为科技能够帮助解决一些环境问题。科技公司有强烈的动机不断创新和升级他们的产品，以获得竞争优势、吸引用户、创造收入并在竞争激烈的市场中生存。这种创新动力通常基于科学突破，而科学突破对于应对长期存在的环境挑战至关重要。",en:"Yes, I think technology can help address some environmental issues. Technology companies have strong incentives to constantly innovate and upgrade their products to gain a competitive edge, attract users, generate income and survive in a competitive market. This drive for innovation is often based on scientific breakthroughs, which are essential for tackling persistent environmental challenges. For instance, renewable energy sources — such as water, tidal, wind, and solar power — have unlocked new ways to generate electricity. Scientists are constantly expanding our understanding of how to harness wind and tidal power to drive turbines, as well as how to collect and convert solar energy into electricity. This also involves advances in material science as researchers discover which materials are best for designing and manufacturing facilities, appliances, and devices that maximize energy output and minimize energy loss. All of this can ultimately reduce our reliance on traditional fossil fuels and help prevent the greenhouse gas emissions caused by burning coal, oil, and natural gas."},
      {title:"Individuals can do nothing to improve the environment. Only governments and large companies can make a difference. To what extent do you agree or disagree?",type:"essay",cn:"在某些情况下，环境保护超出了个人的能力，只有政府和公司才有财力和足够的手段来对局势产生重大影响。另一方面，个人有时可以通过实施生活方式的改变来践行绿色生活，在应对环境挑战方面发挥关键作用。",en:"It has been argued that environmental problems can be mitigated by government departments and larger corporations because such initiatives are beyond the capacity of individuals. I agree with this opinion in some cases, but this is not always true. On the one hand, there are circumstances in which the protection of the environment exceeds the capacity of individuals, so only governments and companies have the financial resources and sufficient means to make a significant impact on the situation. This is particularly true in cases where advancing environmental initiatives requires a substantial capital investment, such as developing environmentally friendly technologies to adopt possible environmental issues or drastically changing public behavior. Governments can allocate a significant portion of their budget toward implementing environmental policies like providing subsidies for electric vehicles to significantly decrease car emissions and combat global warming, or funding citizens responsible waste sorting and disposal practices. Likewise, established corporations have vast financial resources and are crucial in investing millions into developing innovative environmentally friendly products, devices, and technologies, such as energy-saving lighting devices, hybrid cars, which are typically beyond the means of individual citizens. On the other hand, individuals can sometimes play critical roles in addressing environmental challenges by implementing lifestyle changes to go green and minimize the environmental impacts of their daily lives. A significant proportion of pollution, such as waste generation and greenhouse gas emissions from energy and fuel consumption, can be linked to consumers\\' irresponsible behaviors. Environmental issues can be significantly alleviated when individuals take the initiative to adopt sustainable practices, like opting for public transport over private vehicles, incorporating water and electricity-saving measures, recycling household products, reducing waste, and cutting back on meat consumption to lessen the environmental burden of livestock farming. These measures do not necessitate significant expenses or time commitments, enabling individuals to effectively reduce their carbon footprint without the need for new green technologies or government intervention. In conclusion, some environmental issues can only be addressed by the government or well-established companies; however, this may not apply universally in all cases."},
      {title:"Some people think history has nothing or little to tell us, but others think that studying the past history can help us better understand the present. Discuss both views and give your own opinion.",type:"essay",cn:"支持第一种观点的人认为，在变革时期，现代与过去有着巨大的不同。另一方面，反对者认为历史加深了我们对当前时代的理解，因为人类的本性没有改变。",en:"It is sometimes interesting to discuss whether people gain an insight into the present by studying history. I personally believe that they can acquire no knowledge from the past, although the opposing view can be true in some cases. Proponents of the first view argue that in times of change, the modern age differs tremendously from the past. This is evident in cases where economic expansion, globalisation and technological progress-including automation, artificial intelligence, the advent of modern transportation, the development of digital technology- has constantly driven social changes. Work practices, economic structures, ways of living, values and social systems have undergone significant changes, such as a shift from a farming-based economy to a knowledge-driven one. The experience, knowledge, methods and ideas that held historical significance no longer apply in modern times, since these transformations have occurred. For example, gender discriminatory practices and labour exploitation are no longer introduced in the modern age, as technological innovations have led to economic restructuring, the increased presence of women in the workforce and a sharp rise in intellectual workers. On the other hand, opponents hold the view that history deepens our understanding of present times since human nature remains unchanged and some timeless rules exist. This is due to the fact that attributes, desires and natural tendencies have been passed on across generations as a result of the revolution of millions of years. Revolutions in human society do not change these innate features, which has led to the persistence of some habits, patterns and choices. Historical knowledge offers a glimpse on the contemporary world for the simple reason that people can learn about human nature deeply. Examples include prevalence of crime and wars, because some inherited traits such as greed, selfishness and aggression remain. People can develop an in-depth knowledge of the modern world, which leads to well-informed decisions and sound judgment. In my opinion, I agree that studying history does not teach any lesson about modern times, although it is important to recognise that learning from history can offer people some inspirations."}
    ]
  },
  {
    id: "culture",
    title: "文化话题",
    groups: [
      {phrases:[{cn:"保护传统",en:"preserve traditions"},{cn:"促进身份认同",en:"promote a sense of identity"},{cn:"区分不同文化",en:"distinguish one culture from another"}],sentenceCn:"保护传统能促进身份认同。传统有助于区分不同文化。",sentenceEn:"Preserving traditions promotes a sense of identity. Traditions help distinguish one culture from another."},
      {phrases:[{cn:"让传统保持活力",en:"keep traditions alive"},{cn:"社会变化",en:"societal changes"},{cn:"文化多样性",en:"cultural diversity"}],sentenceCn:"人们认为保持传统非常重要。全球化等社会变化对文化多样性产生了负面影响。",sentenceEn:"People consider it important to keep their traditions alive. Societal changes such as globalization have a negative effect on cultural diversity."},
      {phrases:[{cn:"遵循传统的做法",en:"follow traditions"},{cn:"提升社会凝聚力",en:"improve social cohesion"},{cn:"感受到强烈的归属感",en:"feel a strong sense of belonging"}],sentenceCn:"遵循传统的做法可以促进社会凝聚力。人们往往会对自己的文化社区感受到强烈的归属感。",sentenceEn:"Following traditions can contribute to social cohesion. People tend to feel a strong sense of belonging to their cultural community."},
      {phrases:[{cn:"因地而异",en:"vary from region to region"},{cn:"辨别一个民族群体",en:"identify an ethnic group"},{cn:"服饰风格",en:"clothing styles"},{cn:"宗教活动",en:"religious practices"}],sentenceCn:"文化习俗因地区而异。我们可以通过其服饰风格、饮食习惯、宗教活动来辨别一个民族群体。",sentenceEn:"Cultural norms vary from region to region. It is easy to identify an ethnic group by its clothing styles, dietary habits, and religious practices."},
      {phrases:[{cn:"穿传统服饰",en:"wear traditional clothing"},{cn:"重拾文化遗产",en:"reconnect with heritage"},{cn:"传统服装",en:"traditional attire"},{cn:"激发自豪感",en:"instil a sense of pride"}],sentenceCn:"穿着传统服饰可以让人们重拾文化遗产。传统服装可以帮助特定的民族群体激发自豪感。",sentenceEn:"Wearing traditional clothing allows people to reconnect with their heritage. Traditional attire can help instil a sense of pride within a specific ethnic group."},
      {phrases:[{cn:"遵守传统习俗",en:"follow traditional norms"},{cn:"遵守习俗",en:"conform to norms"}],sentenceCn:"许多人不愿意遵守传统习俗。遵守这些习俗既昂贵又耗时。",sentenceEn:"Many people are unwilling to follow traditional norms. It is expensive and time-consuming to conform to these norms."},
      {phrases:[{cn:"庆祝传统节日",en:"celebrate traditional festivals"},{cn:"演奏传统乐器",en:"play traditional musical instruments"},{cn:"欣赏传统表演",en:"enjoy traditional performances"}],sentenceCn:"人们仍然习惯于庆祝传统节日、演奏传统乐器和欣赏传统表演。这让他们能够从单调的现代生活中得到片刻放松。",sentenceEn:"It is still common for people to celebrate traditional festivals, play traditional musical instruments, and enjoy traditional performances. It allows them to take a break from the monotony of modern life."},
      {phrases:[{cn:"生活在快速变化的世界中",en:"live in a fast-changing world"},{cn:"挑战传统观念",en:"challenge traditional views"},{cn:"摒弃过时的做法",en:"abandon outdated practices"}],sentenceCn:"我们生活在一个快速变化的世界中。有必要挑战一些传统观念，摒弃过时的做法。",sentenceEn:"We live in a fast-changing world. It is necessary to challenge some traditional views and abandon outdated practices."},
      {phrases:[{cn:"从历史的教训中学习",en:"learn from past lessons"},{cn:"发现规律",en:"identify patterns"},{cn:"预测后果",en:"predict consequences"}],sentenceCn:"历史让人们从过去的教训中学习。它帮助人们发现规律并预测决策的后果。",sentenceEn:"History allows people to learn from past lessons. It helps people identify patterns and predict the consequences of decisions."},
      {phrases:[{cn:"学习历史",en:"study history"},{cn:"避免重复错误",en:"avoid repeating mistakes"}],sentenceCn:"历史往往会重演。学习历史帮助人们避免重复过去的错误。",sentenceEn:"History tends to repeat itself. Studying history helps people avoid repeating past mistakes."}
    ],
    paragraphs: [
      {title:"Do you think traditions are important for a country? Why?",type:"part3",cn:"我认为传统对于一个国家来说至关重要，因为它们能够提升归属感并有助于社会凝聚力。在当今现代世界，全球化、城市化和其他社会变革已经显著减少了文化多样性。保护传统有助于区分不同的文化，并提醒人们他们独特的文化遗产。",en:"I believe traditions are extremely important for a country because they promote a sense of identity and contribute to social cohesion. In today\\'s modern world, globalization, urbanization, and other societal changes have significantly reduced cultural diversity. Preserving traditions helps distinguish one culture from another and reminds people of the unique aspects of their heritage. For example, some ethnic minorities in China still keep their traditions alive, such as their distinctive clothing styles, food preferences, dietary habits, religious practices, and traditional costumes. These traditions foster a sense of unity, as people who follow them tend to develop a strong sense of belonging to their cultural community."},
      {title:"Do you like to celebrate important events? Why?",type:"part3",cn:"实际上，我不太喜欢庆祝重要的节日，因为这既费时又费钱。在当今这个现代社会，人们越来越注重预算和时间。保持某些传统或遵循传统习俗往往需要大量的花费和充分的准备。",en:"Actually, I don\\'t enjoy celebrating important events because it is time-consuming and expensive. In today\\'s modern world, people are increasingly budget-conscious and time-conscious. Preserving certain traditions or following traditional norms often requires significant expenses and substantial preparation, which can be both costly and cumbersome. For example, when celebrating Chinese New Year, we usually have to invest a lot of time and effort into preparing the New Year\\'s Eve dinner, decorating the house, and preparing lucky money in red envelopes for family and friends. Additionally, traditional celebrations like setting off firecrackers can also be quite expensive. Personally, I think there are alternative ways to celebrate—such as simply having a family dinner and sharing food—which are more than enough to strengthen family bonds."},

uctivity and efficiency over diversity and cultural identity. Visiting museums such as war memorials or those exhibiting treasured artwork and relics of historical significance can be incorporated into school curricula as an educational activity. This approach can remind younger generations of the importance of learning from the past, preserving traditions, and understanding the historical roots of their cultural heritage. In conclusion, I agree that incorporating some forms of entertainment in museums can help generate interest among young visitors and impart knowledge in engaging ways. However, I am aware that making greater emphasis on the educational purpose may make more sense in certain circumstances."}

// ===== PROGRESS (localStorage) =====
const STORAGE_KEY = "ielts_phrase_progress";

function loadProgress() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    return d ? JSON.parse(d) : {phrases:{},sentences:{},paragraphs:{}};
  } catch(e) { return {phrases:{},sentences:{},paragraphs:{}}; }
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

let progress = loadProgress();

function phraseKey(topicId, groupIdx, phraseIdx) {
  return topicId + "-g" + groupIdx + "-p" + phraseIdx;
}
function sentenceKey(topicId, groupIdx) {
  return topicId + "-s" + groupIdx;
}
function paraKey(topicId, paraIdx) {
  return topicId + "-para" + paraIdx;
}

function getTopicPhraseCount(topic) {
  return topic.groups.reduce((a, g) => a + g.phrases.length, 0);
}

function getTopicMasteredCount(topic) {
  let count = 0;
  topic.groups.forEach((g, gi) => {
    g.phrases.forEach((_, pi) => {
      if (progress.phrases[phraseKey(topic.id, gi, pi)]) count++;
    });
  });
  return count;
}

function getTopicSentenceDone(topic) {
  let count = 0;
  topic.groups.forEach((_, gi) => {
    if (progress.sentences[sentenceKey(topic.id, gi)]) count++;
  });
  return count;
}

function getTopicParaDone(topic) {
  let count = 0;
  topic.paragraphs.forEach((_, pi) => {
    if (progress.paragraphs[paraKey(topic.id, pi)]) count++;
  });
  return count;
}

// ===== HELPERS =====
function getTopic(bookId, topicId) {
  const book = BOOKS.find(b => b.id === bookId);
  if (!book) return null;
  return book.topics.find(t => t.id === topicId);
}

function normalizeForCompare(s) {
  return s.trim().toLowerCase()
    .replace(/\u2019/g, "'").replace(/\u2018/g, "'")
    .replace(/\u201c/g, '"').replace(/\u201d/g, '"')
    .replace(/\u2014/g, "-").replace(/\u2013/g, "-")
    .replace(/\s*-\s*/g, "-")
    .replace(/\s+/g, " ");
}

function phrasesMatch(input, correct) {
  const a = normalizeForCompare(input);
  const b = normalizeForCompare(correct);
  return a === b;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// ===== TTS =====
function speak(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.85;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang === "en-US") || voices.find(v => v.lang.startsWith("en"));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}
if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = () => {};
  speechSynthesis.getVoices();
}

// ===== DIFF ALGORITHM (LCS-based word diff) =====
function computeDiff(userText, correctText) {
  const norm = s => s.replace(/\s+/g," ").trim();
  const uWords = norm(userText).split(" ").filter(w => w);
  const cWords = norm(correctText).split(" ").filter(w => w);
  const m = uWords.length, n = cWords.length;
  const wordEq = (a,b) => {
    const na = a.toLowerCase().replace(/[.,!?;:'"()]/g,"");
    const nb = b.toLowerCase().replace(/[.,!?;:'"()]/g,"");
    return na === nb;
  };
  const dp = [];
  for (let i = 0; i <= m; i++) {
    dp[i] = new Array(n+1).fill(0);
  }
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (wordEq(uWords[i-1], cWords[j-1])) {
        dp[i][j] = dp[i-1][j-1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
      }
    }
  }
  const matched = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (wordEq(uWords[i-1], cWords[j-1])) {
      matched.unshift({ui: i-1, ci: j-1});
      i--; j--;
    } else if (dp[i-1][j] > dp[i][j-1]) {
      i--;
    } else {
      j--;
    }
  }
  const uMatch = new Set(matched.map(p => p.ui));
  const cMatch = new Set(matched.map(p => p.ci));
  return {
    userWords: uWords.map((w, i) => ({word: w, ok: uMatch.has(i)})),
    correctWords: cWords.map((w, i) => ({word: w, matched: cMatch.has(i)})),
    score: n > 0 ? Math.round(matched.length / n * 100) : 100
  };
}

// ===== PHRASE PRACTICE =====
function startPractice(bookId, topicId) {
  const topic = getTopic(bookId, topicId);
  if (!topic) return;
  state.view = "phrasePractice";
  state.bookId = bookId;
  state.topicId = topicId;
  state.groupIdx = 0;
  state.phraseIdx = 0;
  state.phase = "phrase";
  state.showingAnswer = false;
  state.correctFirstTry = 0;
  state.totalAttempted = 0;
  state.currentGroupAttempts = {};
  renderSidebar();
  renderPhraseView();
}

function renderPhraseView() {
  const topic = getTopic(state.bookId, state.topicId);
  if (!topic) return;
  if (state.groupIdx >= topic.groups.length) {
    renderCompletion(topic);
    return;
  }
  const group = topic.groups[state.groupIdx];
  if (state.phase === "phrase") {
    if (state.phraseIdx >= group.phrases.length) {
      state.phase = "sentence";
      renderPhraseView();
      return;
    }
    const phrase = group.phrases[state.phraseIdx];
    const totalPhrases = getTopicPhraseCount(topic);
    let flatIdx = 0;
    for (let i = 0; i < state.groupIdx; i++) flatIdx += topic.groups[i].phrases.length;
    flatIdx += state.phraseIdx;
    $breadcrumb().innerHTML = '<span>' + topic.title + '</span> / 词组背诵';
    $topbarActions().innerHTML = '<button onclick="goHome()">退出背诵</button>';
    let html = '<div class="practice-wrap"><div class="practice-card">';
    html += '<div class="practice-group-label">第 ' + (state.groupIdx + 1) + ' 组 · 词组 ' + (state.phraseIdx + 1) + ' / ' + group.phrases.length + '</div>';
    html += '<div class="practice-chinese">' + phrase.cn + '</div>';
    html += '<div class="practice-answer-reveal" id="answerReveal" style="min-height:56px;display:flex;align-items:center;justify-content:center">' + phrase.en + '</div>';
    html += '<div id="beforeReveal" style="display:flex;gap:12px;align-items:center;justify-content:center;margin-bottom:16px">';
    html += '<button class="btn btn-primary btn-lg" onclick="revealPhraseAnswer()" style="min-width:180px">点击显示答案</button>';
    html += '<button class="hint-btn" id="hintBtn" onclick="playHint()" title="朗读">' + icon("volume", 22) + '</button>';
    html += '</div>';
    html += '<div id="afterReveal" style="display:none;gap:16px;justify-content:center;margin-bottom:8px">';
    html += '<button class="btn btn-success btn-lg" onclick="phraseMarkKnown()">记住了 ✓</button>';
    html += '<button class="btn btn-secondary btn-lg" onclick="phraseMarkUnknown()">没记住 ✗</button>';
    html += '<button class="hint-btn" id="hintBtn2" onclick="playHint()" title="朗读">' + icon("volume", 22) + '</button>';
    html += '</div>';
    html += '</div></div>';
    html += '<div class="practice-progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:' + (flatIdx / totalPhrases * 100) + '%"></div></div>';
    html += '<div class="progress-text">' + flatIdx + ' / ' + totalPhrases + '</div></div>';
    $content().innerHTML = html;
  } else if (state.phase === "sentence") {
    renderSentencePractice(topic);
  }
}
function revealPhraseAnswer() {
  var r = document.getElementById("answerReveal"); if(r) r.classList.add("show");
  var b = document.getElementById("beforeReveal"); if(b) b.style.display = "none";
  var a = document.getElementById("afterReveal"); if(a) a.style.display = "flex";
  var topic = getTopic(state.bookId, state.topicId);
  if(topic){var g = topic.groups[state.groupIdx]; speak(g.phrases[state.phraseIdx].en);}
}
function phraseMarkKnown() {
  progress.phrases[phraseKey(state.topicId, state.groupIdx, state.phraseIdx)] = true;
  saveProgress(); renderSidebar();
  state.phraseIdx++; state.showingAnswer = false; renderPhraseView();
}
function phraseMarkUnknown() {
  state.phraseIdx++; state.showingAnswer = false; renderPhraseView();
}

function playHint() {
  const topic = getTopic(state.bookId, state.topicId);
  if (!topic) return;
  if (state.phase === "phrase") {
    const group = topic.groups[state.groupIdx];
    speak(group.phrases[state.phraseIdx].en);
  } else {
    const group = topic.groups[state.groupIdx];
    speak(group.sentenceEn);
  }
  const btn = document.getElementById("hintBtn");
  if (btn) { btn.classList.add("playing"); setTimeout(() => btn.classList.remove("playing"), 1500); }
}

function checkPhraseAnswer() {
  if (state.showingAnswer) return;
  const topic = getTopic(state.bookId, state.topicId);
  const group = topic.groups[state.groupIdx];
  const phrase = group.phrases[state.phraseIdx];
  const input = document.getElementById("phraseInput");
  const val = input.value.trim();
  if (!val) return;
  const feedback = document.getElementById("feedback");
  const attemptKey = state.groupIdx + "-" + state.phraseIdx;
  if (phrasesMatch(val, phrase.en)) {
    input.classList.add("correct");
    input.disabled = true;
    feedback.className = "practice-feedback correct";
    feedback.textContent = "✓ 正确!";
    if (!state.currentGroupAttempts[attemptKey]) {
      state.correctFirstTry++;
    }
    state.totalAttempted++;
    progress.phrases[phraseKey(state.topicId, state.groupIdx, state.phraseIdx)] = true;
    saveProgress();
    renderSidebar();
    setTimeout(() => {
      state.phraseIdx++;
      state.showingAnswer = false;
      delete state.currentGroupAttempts[attemptKey];
      renderPhraseView();
    }, 800);
  } else {
    state.currentGroupAttempts[attemptKey] = true;
    input.classList.add("wrong");
    input.disabled = true;
    feedback.className = "practice-feedback wrong";
    feedback.textContent = "✗ 再试一次";
    speak(phrase.en);
    const reveal = document.getElementById("answerReveal");
    reveal.classList.add("show");
    state.showingAnswer = true;
    setTimeout(() => {
      reveal.classList.remove("show");
      input.classList.remove("wrong");
      input.disabled = false;
      input.value = "";
      input.focus();
      feedback.textContent = "";
      state.showingAnswer = false;
    }, 5000);
  }
}

function skipPhrase() {
  const topic = getTopic(state.bookId, state.topicId);
  const group = topic.groups[state.groupIdx];
  if (state.phase === "phrase") {
    state.phraseIdx++;
    if (state.phraseIdx >= group.phrases.length) {
      state.phase = "sentence";
      state.phraseIdx = 0;
    }
  } else {
    state.groupIdx++;
    state.phraseIdx = 0;
    state.phase = "phrase";
  }
  state.showingAnswer = false;
  renderPhraseView();
}

// ===== SENTENCE PRACTICE =====
function renderSentencePractice(topic) {
  const group = topic.groups[state.groupIdx];
  $breadcrumb().innerHTML = '<span>' + topic.title + '</span> / 例句背诵 · 第 ' + (state.groupIdx + 1) + ' 组';
  $topbarActions().innerHTML = '<button onclick="goHome()">退出背诵</button>';
  const totalPhrases = getTopicPhraseCount(topic);
  let flatIdx = 0;

// ===== MEMORIZE MODE =====
function highlightPhrases(text, topic) {
  const phrases = [];
  topic.groups.forEach(g => {
    g.phrases.forEach(p => phrases.push(p.en));
  });
  phrases.sort((a, b) => b.length - a.length);
  let result = text;
  const placeholders = [];
  phrases.forEach(phrase => {
    const regex = new RegExp(phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    result = result.replace(regex, match => {
      const idx = placeholders.length;
      placeholders.push(match);
      return '\x00PH' + idx + '\x00';
    });
  });
  placeholders.forEach((orig, idx) => {
    result = result.replace('\x00PH' + idx + '\x00', '<mark class="phrase-hl">' + orig + '</mark>');
  });
  return result;
}

let memoTab = "phrases";
let memoGroupIdx = 0;
let memoParaIdx = 0;

function showMemorize(bookId, topicId) {

}

function memoNav(dir) {
  const topic = getTopic(state.bookId, state.topicId);
  if (!topic) return;
  if (memoTab === "phrases") {
    memoGroupIdx = Math.max(0, Math.min(topic.groups.length - 1, memoGroupIdx + dir));
  } else {
    memoParaIdx = Math.max(0, Math.min(topic.paragraphs.length - 1, memoParaIdx + dir));
  }
  renderMemorizePage();
}

  const bookId = state.bookId, topicId = state.topicId;

  html += '</div>';

  if (memoTab === "phrases") {
    var gi = memoGroupIdx;

    html += '<button class="memo-nav-btn" onclick="memoNav(1)"' + (gi === totalGroups - 1 ? ' disabled' : '') + '>' + icon("arrowRight",20) + '</button></div>';
    html += '<div class="memo-group">';
    g.phrases.forEach(function(p, pi) {
      html += '<div class="memo-phrase-row"><span class="memo-phrase-cn">' + p.cn + '</span><span class="memo-phrase-en" data-hl-key="' + topicId + ':ph:' + gi + '-' + pi + '">' + p.en + '</span></div>';
    });
    html += '<div class="memo-sentence">';
    html += '<div class="memo-sentence-label">例句</div>';
    html += '<div class="memo-sentence-cn">' + g.sentenceCn + '</div>';
    html += '<div class="memo-sentence-en" data-hl-key="' + topicId + ':sent:' + gi + '">' + highlightPhrases(g.sentenceEn, topic) + '</div>';
    html += '</div></div>';
  } else {
    var pi = memoParaIdx;

  catch(e) { return {}; }
