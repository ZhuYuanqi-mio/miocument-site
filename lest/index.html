<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思词组背诵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;overflow:hidden}
::selection{background:#e8520e33}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#a1a1a6}

.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:260px;min-width:260px;background:#fff;border-right:1px solid #e5e5ea;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid #e5e5ea}
.sidebar-header h1{font-size:18px;font-weight:700;color:#1d1d1f;display:flex;align-items:center;gap:8px}
.sidebar-header h1 .logo{color:#e8520e;font-size:22px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-section{margin-bottom:4px}
.nav-section-title{padding:8px 20px 4px;font-size:11px;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;padding:9px 20px;cursor:pointer;color:#1d1d1f;font-size:14px;transition:all .15s;border-left:3px solid transparent;gap:8px}
.nav-item:hover{background:#f5f5f7}
.nav-item.active{background:#fef0e8;color:#e8520e;border-left-color:#e8520e;font-weight:600}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-item .nav-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .nav-badge{font-size:11px;background:#e5e5ea;color:#86868b;padding:1px 8px;border-radius:10px;font-weight:500}
.nav-item.active .nav-badge{background:#e8520e;color:#fff}
.nav-sub{padding-left:16px}
.nav-sub .nav-item{font-size:13px;padding:7px 20px}
.nav-divider{height:1px;background:#e5e5ea;margin:8px 16px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid #e5e5ea;background:#fff;min-height:52px}
.breadcrumb{font-size:14px;color:#86868b}
.breadcrumb span{color:#1d1d1f;font-weight:600}
.topbar-actions{display:flex;gap:8px}
.topbar-actions button{padding:6px 16px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;border:1px solid #e5e5ea;background:#fff;color:#1d1d1f;font-weight:500}
.topbar-actions button:hover{background:#f5f5f7;border-color:#d1d1d6}
.content{flex:1;overflow-y:auto;padding:28px 32px}

/* Dashboard */
.dashboard-title{font-size:26px;font-weight:700;margin-bottom:8px}
.dashboard-subtitle{font-size:15px;color:#86868b;margin-bottom:28px}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.topic-card{background:#fff;border-radius:16px;padding:24px;border:1px solid #e5e5ea;transition:all .25s;cursor:pointer;position:relative;overflow:hidden}
.topic-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-2px)}
.topic-card .card-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:12px}
.topic-card .card-tag.money{background:#fef0e8;color:#e8520e}
.topic-card .card-tag.consume{background:#e8f5e9;color:#2e7d32}
.topic-card h3{font-size:17px;font-weight:700;margin-bottom:8px}
.topic-card .card-stats{display:flex;gap:16px;font-size:13px;color:#86868b;margin-bottom:16px}
.topic-card .card-stats span{display:flex;align-items:center;gap:4px}
.progress-bar{width:100%;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#e8520e,#ff8a50);border-radius:3px;transition:width .4s ease}
.progress-text{font-size:12px;color:#86868b}
.card-actions{display:flex;gap:8px;margin-top:16px}
.btn{padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s;border:none;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#e8520e;color:#fff}
.btn-primary:hover{background:#d04a0c}
.btn-secondary{background:#f5f5f7;color:#1d1d1f;border:1px solid #e5e5ea}
.btn-secondary:hover{background:#e5e5ea}
.btn-success{background:#22c55e;color:#fff}
.btn-success:hover{background:#16a34a}
.btn-ghost{background:transparent;color:#86868b;padding:8px 12px}
.btn-ghost:hover{color:#1d1d1f;background:#f5f5f7}
.btn-lg{padding:12px 28px;font-size:15px;border-radius:10px}

/* Practice Container */
.practice-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 120px);padding:20px}
.practice-card{width:100%;max-width:640px;text-align:center}
.practice-group-label{font-size:13px;color:#86868b;margin-bottom:32px;font-weight:500}
.practice-chinese{font-size:28px;font-weight:700;color:#1d1d1f;margin-bottom:40px;line-height:1.5}
.practice-answer-reveal{font-size:22px;color:#e8520e;font-weight:600;margin-bottom:24px;padding:16px 24px;background:#fef0e8;border-radius:12px;opacity:0;transition:opacity .3s;line-height:1.5}
.practice-answer-reveal.show{opacity:1}
.practice-input-wrap{display:flex;align-items:center;gap:12px;margin-bottom:20px;max-width:500px;margin-left:auto;margin-right:auto}
.practice-input{flex:1;padding:14px 18px;border:2px solid #e5e5ea;border-radius:12px;font-size:17px;outline:none;transition:border-color .2s;color:#1d1d1f;background:#fff;font-family:inherit}
.practice-input:focus{border-color:#e8520e}
.practice-input.correct{border-color:#22c55e;background:#f0fdf4}
.practice-input.wrong{border-color:#ef4444;background:#fef2f2}
.practice-input:disabled{opacity:.5;cursor:not-allowed}
.hint-btn{width:48px;height:48px;border-radius:50%;border:2px solid #e5e5ea;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:20px}
.hint-btn:hover{border-color:#e8520e;background:#fef0e8}
.hint-btn.playing{border-color:#e8520e;background:#fef0e8;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.practice-feedback{min-height:32px;font-size:15px;font-weight:600;margin-bottom:8px}
.practice-feedback.correct{color:#22c55e}
.practice-feedback.wrong{color:#ef4444}
.practice-progress-wrap{position:fixed;bottom:0;left:260px;right:0;padding:16px 32px;background:#fff;border-top:1px solid #e5e5ea;display:flex;align-items:center;gap:16px}
.practice-progress-wrap .progress-bar{flex:1;height:4px}
.practice-progress-wrap .progress-text{font-size:13px;color:#86868b;min-width:60px;text-align:right}
.practice-skip{font-size:13px;color:#86868b;cursor:pointer;text-decoration:underline;margin-top:8px}
.practice-skip:hover{color:#1d1d1f}

/* Sentence / Paragraph Writing */
.writing-wrap{max-width:800px;margin:0 auto}
.writing-title{font-size:20px;font-weight:700;margin-bottom:8px}
.writing-subtitle{font-size:14px;color:#86868b;margin-bottom:24px}
.writing-chinese-box{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:20px 24px;font-size:16px;line-height:1.8;color:#1d1d1f;margin-bottom:20px}
.writing-textarea{width:100%;min-height:150px;padding:16px 20px;border:2px solid #e5e5ea;border-radius:12px;font-size:16px;line-height:1.8;outline:none;transition:border-color .2s;resize:vertical;font-family:inherit;color:#1d1d1f}
.writing-textarea:focus{border-color:#e8520e}
.writing-actions{display:flex;gap:12px;margin-top:16px;justify-content:center}

/* Diff Result */
.result-wrap{max-width:800px;margin:0 auto}
.result-section{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:20px 24px;margin-bottom:16px}
.result-section h3{font-size:14px;font-weight:600;color:#86868b;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.result-text{font-size:16px;line-height:2;word-wrap:break-word}
.result-text .word-correct{color:#22c55e}
.result-text .word-wrong{color:#ef4444;text-decoration:line-through;background:#fef2f2;padding:1px 3px;border-radius:3px}
.result-text .word-missing{color:#e8520e;background:#fef0e8;padding:1px 3px;border-radius:3px;font-style:italic}
.result-text .word-extra{color:#ef4444;background:#fef2f2;padding:1px 3px;border-radius:3px}
.result-score{text-align:center;margin:24px 0}
.result-score .score-num{font-size:48px;font-weight:700;color:#e8520e}
.result-score .score-label{font-size:14px;color:#86868b;margin-top:4px}
.result-actions{display:flex;gap:12px;justify-content:center;margin-top:20px}

/* Paragraph List */
.para-list{max-width:800px;margin:0 auto}
.para-item{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:18px 24px;margin-bottom:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:16px}
.para-item:hover{box-shadow:0 2px 12px rgba(0,0,0,.06);transform:translateY(-1px)}
.para-item .para-icon{font-size:20px;flex-shrink:0}
.para-item .para-info{flex:1}
.para-item .para-title{font-size:15px;font-weight:600;margin-bottom:4px}
.para-item .para-meta{font-size:12px;color:#86868b}
.para-item .para-status{font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;flex-shrink:0}
.para-item .para-status.done{background:#f0fdf4;color:#22c55e}
.para-item .para-status.todo{background:#f5f5f7;color:#86868b}

/* Completion Screen */
.completion-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 120px);text-align:center}
.completion-icon{font-size:64px;margin-bottom:16px}
.completion-title{font-size:24px;font-weight:700;margin-bottom:8px}
.completion-subtitle{font-size:15px;color:#86868b;margin-bottom:24px;max-width:400px;line-height:1.6}
.completion-stats{display:flex;gap:24px;margin-bottom:32px}
.stat-box{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:16px 24px;text-align:center}
.stat-box .stat-num{font-size:28px;font-weight:700;color:#e8520e}
.stat-box .stat-label{font-size:12px;color:#86868b;margin-top:4px}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:#86868b;padding:40px}
.empty-state .empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state h3{font-size:18px;color:#1d1d1f;margin-bottom:8px}
.empty-state p{font-size:14px;max-width:360px;line-height:1.6}

/* SVG Icon */
.icon-svg{display:inline-block;vertical-align:middle;flex-shrink:0}

/* Memorize Mode */
.memorize-wrap{margin:0 auto;padding:0 8px}
.memo-section-title{font-size:20px;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #e5e5ea}
.memo-group{background:#fff;border:1px solid #e5e5ea;border-radius:16px;padding:32px 40px;margin-bottom:20px}
.memo-group-label{font-size:13px;font-weight:600;color:#86868b;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
.memo-phrase-row{display:flex;align-items:baseline;gap:24px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.memo-phrase-row:last-child{border-bottom:none}
.memo-phrase-cn{flex:1;font-size:20px;color:#1d1d1f;font-weight:600}
.memo-phrase-en{flex:1;font-size:20px;color:#e8520e;font-weight:500}
.memo-sentence{margin-top:20px;padding-top:20px;border-top:1px dashed #e5e5ea}
.memo-sentence-label{font-size:13px;font-weight:600;color:#86868b;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.memo-sentence-cn{font-size:17px;color:#1d1d1f;line-height:1.8;margin-bottom:6px}
.memo-sentence-en{font-size:17px;color:#555;line-height:1.8;font-style:italic}
.memo-para{background:#fff;border:1px solid #e5e5ea;border-radius:16px;padding:32px 40px;margin-bottom:20px}
.memo-para-title{font-size:18px;font-weight:700;color:#1d1d1f;margin-bottom:6px}
.memo-para-type{font-size:13px;font-weight:600;color:#86868b;margin-bottom:16px}
.memo-para-cn{font-size:17px;color:#1d1d1f;line-height:1.9;margin-bottom:16px;padding:16px 20px;background:#fafafa;border-radius:10px}
.memo-para-en{font-size:17px;color:#333;line-height:2.1}
.memo-nav{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:24px}
.memo-nav-btn{width:44px;height:44px;border-radius:50%;border:1px solid #e5e5ea;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#1d1d1f;flex-shrink:0}
.memo-nav-btn:first-child svg{transform:rotate(180deg)}
.memo-nav-btn:hover:not(:disabled){background:#fef0e8;border-color:#e8520e;color:#e8520e}
.memo-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.memo-nav-label{font-size:17px;font-weight:600;color:#1d1d1f;min-width:120px;text-align:center}
.phrase-hl{background:#fef0e8;border-bottom:2px solid #e8520e;padding:1px 2px;border-radius:2px}
.user-hl{background:#fff3b0;border-bottom:2px solid #e6c200;padding:1px 2px;border-radius:2px;cursor:pointer}
.user-hl:hover{background:#ffe566}
.hl-popup{position:fixed;display:none;background:#1d1d1f;color:#fff;border-radius:8px;padding:4px 6px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);cursor:pointer;font-size:13px;font-weight:500;line-height:1;white-space:nowrap;user-select:none}
.hl-popup::after{content:'';position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid #1d1d1f}
.hl-popup svg{vertical-align:middle;margin-right:4px}

/* Marked Words */
.mw-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.mw-group-tabs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.mw-group-tab{padding:6px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #e5e5ea;background:#fff;color:#1d1d1f;font-weight:500;transition:all .15s;white-space:nowrap}
.mw-group-tab:hover{background:#f5f5f7}
.mw-group-tab.active{background:#e8520e;color:#fff;border-color:#e8520e}
.mw-group-tab.add-grp{border-style:dashed;color:#86868b}
.mw-group-tab.add-grp:hover{border-color:#e8520e;color:#e8520e}
.mw-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mw-actions label{font-size:13px;color:#86868b;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
.mw-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1100px){.mw-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){.mw-grid{grid-template-columns:repeat(2,1fr)}}
.mw-card{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:16px 18px;position:relative;transition:all .15s}
.mw-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.mw-card.selected{border-color:#e8520e;background:#fef8f4}
.mw-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.mw-card-check{width:18px;height:18px;accent-color:#e8520e;cursor:pointer;margin-top:2px;flex-shrink:0}
.mw-card-menu{background:none;border:none;cursor:pointer;padding:2px 4px;color:#86868b;border-radius:4px;transition:all .15s;flex-shrink:0}
.mw-card-menu:hover{background:#f0f0f0;color:#1d1d1f}
.mw-card-en{font-size:16px;font-weight:700;color:#1d1d1f;margin-bottom:6px;line-height:1.4;word-break:break-word}
.mw-card-cn{font-size:13px;color:#e8520e;cursor:pointer;min-height:20px;line-height:1.4;word-break:break-word}
.mw-card-cn:hover{text-decoration:underline}
.mw-card-cn-input{width:100%;padding:4px 8px;border:1px solid #e8520e;border-radius:6px;font-size:13px;color:#e8520e;outline:none;font-family:inherit}
.mw-card-cn-empty{font-style:italic;color:#ccc}
.mw-dropdown{position:absolute;right:8px;top:36px;background:#fff;border:1px solid #e5e5ea;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:100;min-width:140px;overflow:hidden;animation:fadeIn .12s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.mw-dropdown-item{padding:9px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;color:#1d1d1f;transition:background .1s}
.mw-dropdown-item:hover{background:#f5f5f7}
.mw-dropdown-item.danger{color:#ef4444}
.mw-dropdown-item.danger:hover{background:#fef2f2}
.mw-dropdown-divider{height:1px;background:#e5e5ea;margin:2px 0}
.mw-empty{text-align:center;padding:60px 20px;color:#86868b}
.mw-empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.mw-empty h3{font-size:16px;color:#1d1d1f;margin-bottom:6px;font-weight:600}
.mw-empty p{font-size:13px;max-width:300px;margin:0 auto;line-height:1.5}
.mw-tab-bar{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid #e5e5ea}
.mw-tab{padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;color:#86868b;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.mw-tab:hover{color:#1d1d1f}
.mw-tab.active{color:#e8520e;border-bottom-color:#e8520e;font-weight:600}
.mw-record-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e5e5ea}
.mw-record-table th{background:#fafafa;padding:12px 16px;font-size:12px;font-weight:600;color:#86868b;text-align:left;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #e5e5ea}
.mw-record-table td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.mw-record-table tr:last-child td{border-bottom:none}
.mw-record-table .wrong-list{display:flex;flex-wrap:wrap;gap:4px}
.mw-record-table .wrong-tag{background:#fef2f2;color:#ef4444;padding:2px 8px;border-radius:4px;font-size:12px}
.mw-record-table .btn-sm{padding:4px 12px;font-size:12px;border-radius:6px}
.mw-record-empty{text-align:center;padding:32px;color:#86868b;font-size:14px}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo"><svg class="icon-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M12 2v4"/><path d="M16 2v4"/><rect x="4" y="4" width="16" height="18" rx="2"/><path d="M8 10h8"/><path d="M8 14h8"/><path d="M8 18h5"/></svg></span> 雅思词组背诵</h1>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
  </div>
  <div class="main">
    <div class="topbar" id="topbar">
      <div class="breadcrumb" id="breadcrumb">首页</div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hl-popup" id="hlPopup"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>高亮</div>

<script>
// ===== SVG ICON SYSTEM =====
const ICONS = {
  home:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',

    paragraphs: [
      {title:"Do people who can manage time become successful more easily?",type:"part3",cn:"熟悉并适应了节省时间技能的人拥有竞争优势，可以在学习或工作中取得成功。在当今竞争激烈的世界里，生活节奏加快，个人每天都要处理大量任务。高效的时间管理使他们能够比其他人更快地完成任务，从而提供竞争优势。例如，比竞争对手更快地回应客户的询问和投诉可以显著提高客户满意度，有助于获得更多的合同。这肯定能够帮助他们在职业生涯中取得成功，并使他们能够获得更高的收入。",en:"People who are familiar with and have adapted time-saving skills possess competitive advantages that can lead to success in their studies or work. In today's highly competitive world, the pace of life has accelerated, and individuals are overwhelmed with numerous tasks daily. Efficient time management allows them to complete tasks faster than others, providing a competitive edge. For instance, responding to customers' inquiries and complaints more quickly than competitors can significantly improve customer satisfaction, helping to secure more contracts. This can definitely help them achieve success in their professional lives and enable them to earn a higher income."},
      {title:"Are you often busy?",type:"part3",cn:"是的，我每天都非常忙碌。我想在中国，大多数人也都是这样。正如你所知，我们生活在一个竞争激烈的世界，技术创新不断推动着各行各业的变化。人们必须非常努力地工作才能保住工作，并跟上这些变化。每天努力工作以在竞争中生存是很常见的。例如，即使是管理人员也必须工作到深夜、长时间工作、出差、参加研讨会或接受额外培训，以了解行业趋势并及时满足雇主或客户的需求。这大大减少了用于生活其他方面的时间，例如花时间陪伴家人或定期锻炼。",en:"Yes, I'm extremely busy every day, and I think it's the same for most people in China. As you know, we live in a highly competitive world where technological innovations constantly drive changes across various industries. People have to work very hard to secure employment and stay up to date with these changes. It's common for individuals to work hard every day to survive competition. For example, even managers have to work late into the night, work long hours, go on business trips, attend workshops, or receive extra training to keep up with industry trends and promptly meet the demands of employers or clients. This has significantly reduced the time available for other aspects of life, such as spending quality time with family or exercising regularly."},
      {title:"What kind of pressure do people may experience at work?",type:"part3",cn:"人们在工作中面临的主要压力是表现出色并满足客户、上级、同事以及其他的期望。在当今竞争激烈的世界中，企业努力在市场中生存。这迫使员工极其努力地工作，以最大限度地提高生产并及时满足需求。例如，人们经常工作到深夜以完成客户订单并确保回头生意，因为客户满意度至关重要。然而，这种压力往往会导致其他形式的压力，例如维持健康工作与生活平衡的挑战。",en:"The primary pressure people face in the workplace is the pressure to perform well and meet the expectations of clients, superiors, colleagues, and others. In today's highly competitive world, businesses strive to survive in the market. This pushes employees to work extremely hard to maximize productivity and meet demands promptly. For instance, it's common for people to work late into the night to fulfill client orders and ensure repeat business, as customer satisfaction is crucial. However, this pressure often leads to other forms of stress, such as the challenge of maintaining a healthy work-life balance."},
      {title:"Why do people have a competitive mindset nowadays?",type:"part3",cn:"人们之所以有竞争心态，主要是因为在竞争激烈的世界中生存极为困难。如今，人口增长、快速的技术变革和经济衰退等多种因素导致了竞争水平的提高。人们很难过上体面的生活并找到一份薪水不错的工作。人们必须非常努力地工作，以建立竞争优势，从而超越他人、脱颖而出。例如，现在很多年轻人晚上参加在线课程来提升学历和保持与技术进步同步的情况并不少见。这使他们能够将先进技术融入到工作中，从而比同龄人工作得更快、效率更高。只有这样，他们才能赚到足够的钱来支付生活开支，追求体面的生活质量。",en:"People have a competitive mentality primarily because it is extremely difficult for them to survive in a competitive world. It is true that nowadays, many factors such as population growth, rapid technological change, and economic recessions have led to a higher level of competition. It has become hard for people to make a decent living and secure a well-paying job. People have to work extremely hard to build competitive advantages so that they can outperform others and stand out. For example, it is not unusual for many young people nowadays to attend online courses at night to improve their academic qualifications and stay updated with technological advancements. This allows them to integrate advanced technology into their work, enabling them to work faster and achieve higher productivity than their peers. Only in this way can they earn enough money to cover living expenses and pursue a decent quality of life."},
      {title:"What benefits are there when working for big companies?",type:"part3",cn:"在大公司工作的主要好处是有可能保证收入稳定，尤其是在经济困难时期，由于高失业率和不断上涨的生活成本，获得工作机会可能很困难。然而，大公司通常拥有强大的品牌、相当大的市场份额和雄厚的财力。这些优势使它们能够开发新产品、改进服务并保持其竞争优势。因此，大公司有可能留住员工并为员工提供更高的薪水。例如，许多著名的电子商务巨头都以每年向其员工支付极高的收入而闻名。一份体面的薪水不仅有助于个人维持和提高他们的生活水平，还可以提高他们的生活满意度。",en:"The main benefit of working for large companies is the potential for job security and financial stability—especially in today's tough economic times, where securing employment can be difficult due to high unemployment rates and the ever-rising cost of living. Large companies, however, often have strong brands, large market shares, and significant financial resources. These advantages enable them to develop new products, improve services, and maintain their competitive edge. As a result, large companies are more likely to retain employees and offer them higher salaries. For instance, many well-known e-commerce giants are renowned for paying their employees extremely high incomes annually. A decent salary not only helps individuals sustain and improve their standard of living but also raises their life satisfaction."},
      {title:"Pressure on school and university students (Body A)",type:"essay",cn:"迫使学生努力学习是一种积极的发展，因为学生可以获取更多的知识并在就业市场中获得一些竞争优势。在工作的世界里竞争是激烈的，只有受过良好教育的人才有机会在未来找到工作。如果他们从小就被迫长时间学习，做作业，参加辅导和做模拟测试，他们就会加深对不同学科的理解并获得优异的成绩。他们的学业表现为更高层次的教育铺平了道路，并改善了就业前景，从而获得经济保障和体面的生活质量。",en:"Pushing students to study harder is a positive development since students can acquire more knowledge and gain some competitive advantages in the job market. The competition is intense in the world of work and only well-educated people have a good chance of securing a job in the future, as they have knowledge and skills to handle a great variety of tasks. If they are pressured to study long hours from a young age, including doing homework, attending tutorials and doing practice tests, they deepen their understanding of different subjects and gain impressive grades. Their academic performance paves way for higher levels of education and improves job prospects, leading to financial security and a decent quality of life."},
      {title:"Pressure on school and university students (Body B)",type:"essay",cn:"另一方面，迫使学生努力学习可能会阻碍他们的全面发展，因为他们可能无法培养出有益于生活各个方面的艺术技能。当学生把所有的时间和精力都花在实现学业目标上，而忽视了其他生活领域时，就会发生这种情况。因此，他们可能没有时间进行体育活动，从而导致视力受损、肥胖和背痛等健康问题。此外，缺乏对音乐和艺术等课外活动的参与会限制他们积极引导负面情绪的能力，影响他们的心理和情绪健康。对学术任务的强调也会减少他们对社交活动和小组工作的参与，损害他们的社交技能，并可能导致孤立感。不培养多种技能的人可能难以独立应对现代世界的需求。",en:"On the other hand, pressuring students to study hard can hinder their holistic development, as they may fail to develop artistic skills that benefit various aspects of life. This occurs when students devote all their time and energy to achieving academic goals, neglecting other life areas. Consequently, they may not have time for physical activities, leading to health issues such as impaired vision, obesity, and back pain. Additionally, a lack of engagement in extracurricular activities like music and art can limit their ability to channel negative emotions positively, affecting their mental and emotional well-being. The emphasis on academic tasks can also reduce their participation in social activities and group work, impairing their social skills and potentially leading to feelings of isolation. Individuals who do not cultivate a diverse range of skills may struggle to cope with the demands of the modern world independently."},
      {title:"Many people fail to achieve a balance (Causes)",type:"essay",cn:"人们发现很难实现工作与生活的平衡，主要是因为他们试图在一个竞争激烈的世界中生存。人口增长、经济衰退和快速的技术变革导致就业市场竞争加剧，使个人难以获得长期就业。因此，许多人长时间工作以满足雇主和客户的期望，确保他们能够保住自己的职位。例如，员工经常每天参加大量的商务会议讨论工作相关事务，并工作到深夜以处理订单和满足客户需求。此外，许多人参加额外的课程、研讨会和培训以磨练技能和建立专业知识，使他们能够更高效地工作。这些活动非常耗时，几乎没有时间用于生活的其他重要方面，如休闲、家庭和社交。",en:"People find it difficult to achieve a work-life balance primarily because they try to survive in a highly competitive world. Population growth, economic downturns, and rapid technological changes have led to increased competition in the job market, making it challenging for individuals to secure long-term employment. As a result, many people work long hours to meet the expectations of employers and clients, ensuring they can retain their positions. For example, employees often attend numerous business meetings daily to discuss work-related matters, and work late into the night to address orders and satisfy customer demands. Additionally, many individuals take extra courses, attend workshops, and undergo training to sharpen their skills and build expertise, enabling them to work more efficiently and effectively. These activities are highly time-consuming, leaving little time for other important aspects of life, such as leisure, family, and socialization."},
      {title:"Many people fail to achieve a balance (Solutions)",type:"essay",cn:"为了解决这个问题，个人有必要明确自己的优先事项，并拓宽对实现生活幸福的视野。许多人过度投入工作，因为他们的动力是赚取高薪和追求物质财富，这往往需要过度工作。然而，他们应该认识到，幸福可以来自多种来源，例如过更简单的生活、与家人共度美好时光，或参加社区志愿活动帮助有需要的人。参与这些活动可以培养成就感、社会认可和肯定。这种关注点的转变可以减少对物质财富的需求，帮助人们避免因忙碌、过度工作的生活方式而常常产生的健康问题、压力和孤立感。",en:"To address this issue, it is necessary for individuals to set their priorities straight and broaden their perspective on achieving happiness in life. Many people overcommit to their work lives because they are motivated by the goal of earning a high salary and pursuing material wealth, which often requires overworking. However, they should recognize that happiness can be derived from diverse sources, such as leading a simpler life, spending quality time with family, or volunteering in community activities to help those in need. Engaging in such activities can foster a sense of fulfillment, social recognition, and validation. This shift in focus can reduce the demand for material wealth, helping people avoid the health problems, stress, and feelings of isolation that often arise from a busy, overworked lifestyle."}
    ]

      {phrases:[{cn:"提高销售额",en:"Increase sales"},{cn:"赚取利润",en:"Make profits"}],sentenceCn:"广告可能会提高销售额。这有助于公司赚取更多的利润。",sentenceEn:"Advertising is likely to increase sales. This helps companies make more profits."},
      {phrases:[{cn:"增加消费者支出",en:"Increase consumer spending"},{cn:"推动经济增长",en:"Drive economic growth"}],sentenceCn:"增加的消费者支出在推动经济增长方面起着重要作用。",sentenceEn:"Increased consumer spending plays a significant role in driving economic growth."},
      {phrases:[{cn:"接触广告",en:"Exposed to advertising"},{cn:"影响对美的看法",en:"Affect the perception of beauty"}],sentenceCn:"人们每天都在接触广告。这对他们的审美观有直接影响。",sentenceEn:"People are exposed to advertising every day. This has a direct impact on their perception of beauty."},
      {phrases:[{cn:"在美容产品上大笔消费",en:"Spend heavily on beauty products"},{cn:"进行整容手术",en:"Have plastic surgeries"},{cn:"让自己更漂亮",en:"improve appearance"}],sentenceCn:"人们在美容产品、化妆品甚至整形手术上大笔消费。这些方法可能有助于改善外貌。",sentenceEn:"People spend heavily on beauty products, cosmetics or even plastic surgeries. These methods may help improve appearance."},
      {phrases:[{cn:"生活在消费驱动的社会",en:"Live in a consumer-driven society"},{cn:"进行不必要的消费",en:"Make unnecessary purchases"}],sentenceCn:"当今的年轻人生活在消费驱动的社会。他们往往会进行不必要的消费。",sentenceEn:"Young people today live in a consumer-driven society. They tend to make unnecessary purchases."},
      {phrases:[{cn:"变得物质化",en:"Become materialistic"},{cn:"财富最大化",en:"Maximise wealth"}],sentenceCn:"如今，许多人变得越来越物质化。他们努力将自己的财富最大化。",sentenceEn:"Many people have become materialistic nowadays. They try to maximise their wealth."},
      {phrases:[{cn:"推广奢侈品",en:"Promote luxury items"},{cn:"在象征地位的物品上过度消费",en:"Overspend on status symbols"}],sentenceCn:"名人在推广奢侈品方面起着关键作用。他们影响着年轻人，在象征地位的物品上过度消费。",sentenceEn:"Celebrities play a critical role in promoting luxury items. They influence young people to overspend on status symbols."}
    ],
    paragraphs: [
      {title:"How do advertisements influence children?",type:"part3",cn:"广告对儿童的世界观有着显著的影响。商家通常每天用广告轰炸他们，以此作为促使人们重复购买的策略。广告经常将某些产品描绘成年轻人应该遵循的社会规范。孩子们可能会觉得，如果不购买广告宣传的产品，他们会感到有缺憾，或者难以融入同龄人。例如，广告可能会将某些游戏描绘成在孩子们中很受欢迎，这使得孩子们觉得有必要购买这些游戏，以便与朋友们有共同的谈资。这给孩子们造成了巨大的商业压力。随着时间的推移，这可能会导致一种日益物质主义的心态，因为孩子们会将开心与购买物品联系起来。",en:"Advertisements have a significant influence on children's perceptions of the world. Businesses often bombard them with ads daily as part of their strategy to promote repeated purchases. Advertisements often portray certain products as social norms that young people should conform to. Children may feel that if they don't buy the advertised products, they will feel inadequate or struggle to fit in with their peers. For example, advertisements might depict certain games as being popular among kids, making children feel compelled to buy those games to have common talking points with their friends. This creates enormous commercial pressure on children. Over time, this could lead to an increasingly materialistic mindset, as children associate happiness with purchasing items."},
      {title:"Should advertising aimed at kids be prohibited?",type:"part3",cn:"我不认为禁止所有针对儿童的广告是合适的。确实，市场上充斥着各种品牌，以满足不同的消费者需求。人们生活繁忙，往往缺乏时间去彻底研究所有可用的选项。广告可以提供有价值的信息，帮助消费者做出明智的决定。例如，如果孩子们想学习外语，市面上就有无数的材料和书籍可供选择。广告可以帮助家长们辨别出最适合孩子水平和特定需求的资源。这可以帮助避免做出错误决定造成的经济损失和挫败感。",en:"I don't think it is appropriate to ban all advertisements targeted at children. It is true that the market is flooded with various brands catering to different consumer needs. People lead busy lives and often lack the time to research all the available options thoroughly. Advertising can provide valuable information, allowing consumers to make well-informed decisions. For example, if children want to learn a foreign language, there are countless materials and books available on the market. Advertisements can help parents identify the resources that best match their children's levels and specific needs. This can help avoid the financial losses and frustration of making the wrong decisions."},
      {title:"How does social media affect people's buying decisions?",type:"part3",cn:"是的，我认为社交媒体对人们的购买决策确实有很强的影响。社交媒体每天向用户狂轰滥炸般地推送无数的商业信息和图片，这会塑造他们对美丽、成功和幸福的观念。人们常常感到不得不购买产品，试图遵守这些标准。例如，在社交媒体上，用户不断接触到名人甚至朋友使用美容产品、化妆品或进行整容手术来提升外貌的图片。接触这种信息会产生购买相同产品的愿望，希望以此达到类似的效果。否则，人们可能会感到自己有缺憾或者落后于别人。",en:"Yes, I think social media definitely have a strong influence on people's buying decisions. Social media bombards users with countless commercial messages and images every day, which can shape their perceptions of beauty, success, and happiness. People often feel compelled to purchase products in an attempt to follow these standards. For example, on social media, users are constantly exposed to images of celebrities or even their friends using beauty products, cosmetics, or undergoing plastic surgeries to enhance their appearance. This exposure can create a desire to purchase the same products in hopes of achieving similar results. Otherwise, people may feel inadequate or left behind."},
      {title:"Why do people always want to buy new things to replace old ones?",type:"part3",cn:"我认为这主要是因为我们生活在一个消费驱动型社会。以盈利为导向的企业不断采取各种营销策略来鼓励人们购物，以提高利润。一种常见的方法是将购买新产品描绘成一种社会规范。如果人们不遵守这种规范，就会感到被排斥或有缺憾。例如，服装品牌经常在广告上投入巨资。人们认为他们应该像同龄人一样，通过购买最新款的服装来追赶时尚潮流。同样，家用电器和电子产品的生产商也经常每年发布新一代产品。因此，人们被迫升级和购买最新版本，即使他们目前的电器或衣服仍然状况良好。",en:"I think this is mainly because we live in a consumer-driven society. Profit-oriented businesses constantly adopt various marketing tactics to encourage people to make purchases, in order to boost profits. A common approach is to portray buying a new product as a social norm. People feel excluded or inadequate if they don't conform to it. For instance, garment brands often invest heavily in advertisements. People believe that they should follow fashion trends by purchasing the latest styles, just like their peers do. Similarly, producers of household appliances and electronic products frequently release new generations of products every year. As a result, people are compelled to upgrade and buy the latest versions, even if their current appliances or clothes are still in good condition."},
      {title:"More and more people buy household goods (Benefits)",type:"essay",cn:"购买各种家居用品，如电视、微波炉和电饭煲，可以提高生产率，节省时间。这些电器在当今世界非常重要，由于激烈的竞争、更高的生活成本和快速的技术进步，人们的生活节奏更快，每天工作时间长。机器让他们的生活更轻松，因为炊具、微波炉、洗衣机和吸尘器等家用电器高度智能，被程序指导自动完成家务。他们还可以在家里通过电视观看关于世界多元文化的音乐会、电影和纪录片，这样就不必离开家去休闲了。那些拥有和使用这些物品的人可以在学习和工作上投入更多时间。这不仅提高了他们在工作场所的竞争力，显著提高了他们的收入，还使他们能够与家人共度更多美好时光。",en:"Purchasing a variety of household items, such as televisions, microwaves, and rice cookers, can improve productivity as it saves time. These appliances are important in a world where people have a fast pace of life and work long hours every day due to stiff competition, higher costs of living and rapid technological advancements. They turn to machines to make their lives easier, because household appliances such as cookers, microwave ovens, washing machines and vacuum cleaners are highly intelligent and programmed to automatically complete household chores. They can also watch concerts, movies and documentaries about the world's diverse cultures on TV at home, which eliminates the need for leaving their home for leisure purposes. Those who own and use these items can invest more time in studying and working. This not only improves their competitiveness in the workplace and raise their income significantly but also allows them to spend more quality time with their family."},
      {title:"More and more people buy household goods (Drawbacks)",type:"essay",cn:"一个主要的缺点是，对家用电器的需求不断增加，导致了垃圾堆积和环境危害。消费文化加剧了这一问题，因为人们经常在广告的推动下购买超过他们需要的东西。许多消费者被各种电器的好处所吸引，却很少使用它们。广告还鼓励频繁升级到最新型号，导致大家大量扔弃旧的电器，扔到垃圾堆里。这些由金属和塑料组成的物品需要几十年的时间才能降解并造成各种污染。这些污染物通过破坏野生动物栖息地和污染人类生存所必需的水、土壤和空气等重要资源，导致环境破坏。",en:"One major disadvantage is that the increasing demand for household appliances contributes to waste accumulation and environmental harm. Consumer culture exacerbates this issue, as people often purchase more than they need, driven by advertising. Many consumers are enticed by the perceived benefits of a vast array of appliances, only to rarely use them. Advertising also encourages frequent upgrades to the latest models, resulting in discarded appliances that end up in landfills. These items, composed of metals and plastics, take decades to degrade and cause various types of pollution. Such pollutants lead to environmental destruction by damaging wildlife habitats and contaminating vital resources like water, soil, and air essential for human survival."},
      {title:"People are surrounded by advertising (Negative effects)",type:"essay",cn:"广告的流行会导致不必要的开支，从而对整体生活质量产生负面影响。这发生在数字技术，特别是社交媒体的发展增加了消费者对广告的接触的时代。广告通过强调产品的好处来吸引人们购买各种产品。例如，一些家用电器，如寿司机或制冰机，被宣传为可用于做饭，但人们很少使用它们。同样，名牌服装和配饰被当作地位的象征进行营销，但普通人很少有机会穿这些东西。冲动购买和过度消费可能导致更高的生活成本，从而可能给消费者带来财务困难。",en:"The prevalence of advertisements can negatively affect the overall quality of life by leading to unnecessary expenses. This occurs at a time when the development of digital technology, especially social media, has increased consumers' exposure to advertising. Advertisements entice people into purchasing various products by highlighting their perceived benefits. For example, some household appliances, such as sushi makers or ice makers, are promoted as useful for meal preparation, but people rarely use them. Similarly, designer outfits and accessories are marketed as status symbols, yet average people seldom have opportunities to wear these items. Impulse buying and overspending can lead to a higher cost of living, potentially resulting in financial difficulties for consumers."},
      {title:"People are surrounded by advertising (Positive effects)",type:"essay",cn:"另一方面，广告可以使消费者在购买决策中更加明智和谨慎，从而使他们更清楚地了解市场上的不同选择。广告使他们能够比较不同产品的质量、性能、功能和价格。例如，广告提供有关智能手机关键功能的信息，以及与其他品牌相比的优势。他们可以很容易地找到物超所值的产品，并可以选择忽略那些使用心理技巧说服他们购买高价商品的广告。这实际上可以帮助他们成为聪明的买家，避免不必要的开支，节省资金。",en:"On the other hand, advertising can benefit consumers by making them more knowledgeable and prudent in their purchasing decisions. This is evident in an era where people have access to vast amounts of information on the internet. Advertising allows them to compare different offerings in terms of quality, performance, features, and prices. Examples include advertisements that provide information about the key features of smartphones, as well as their advantages compared to other brands. They can easily find products that offer great value for their money and can choose to ignore advertisements that use psychological tricks to persuade them into buying overpriced items. This can actually help them become intelligent buyers, avoid unnecessary expenses, and save money."}
    ]
  }
  ]
},
{
  id: "pah",
  title: "【个人差异、年龄&健康】",
  topics: [
  {
    id: "personal",
    title: "个人差异",
    groups: [
      {phrases:[{cn:"经济条件不同",en:"have different financial situations"},{cn:"谋生",en:"make a decent living"}],sentenceCn:"人们在经济条件上有所不同。有些人倾向于花大部分时间在工作谋生上面。",sentenceEn:"People differ in financial situations. Some people tend to spend most of their time working to make a decent living."},
      {phrases:[{cn:"注重事业",en:"become career-oriented"},{cn:"追求个人目标",en:"pursue personal targets"}],sentenceCn:"许多人已经变得以事业为重。他们倾向于将个人目标放在家庭生活之上。",sentenceEn:"Many people have become career-oriented. They tend to prioritise their personal targets over family life."},
      {phrases:[{cn:"定义幸福",en:"define happiness"},{cn:"做义工",en:"do unpaid work"},{cn:"获得成就感",en:"gain a sense of achievement"}],sentenceCn:"人们对幸福的定义不同。一些人选择做义务工，在帮助他人中获得成就感。",sentenceEn:"People tend to define happiness differently. Some people choose to do unpaid work and gain a sense of achievement in helping others."},
      {phrases:[{cn:"离开家乡",en:"leave hometown"},{cn:"搬到其他城市",en:"move to other cities"},{cn:"赚取更高的收入",en:"earn a higher income"},{cn:"发掘天赋才能",en:"explore talents"}],sentenceCn:"有些人离开家乡搬到其他城市寻找工作并不少见。他们希望赚取更高的收入并发掘自己的天赋才能。",sentenceEn:"It is not uncommon for some people to leave their hometown and move to other cities in search of work. They seek to earn a higher income and explore talents."},
      {phrases:[{cn:"实现财务自由",en:"achieve financial freedom"},{cn:"收入有保障",en:"achieve financial security"},{cn:"关注生活的其他方面",en:"focus on other aspects of life"}],sentenceCn:"随着年龄增长，许多人实现了财务自由。他们的关注点从收入有保障转向生活的其他方面。",sentenceEn:"With age, many people achieve financial freedom. They tend to shift focus from financial security to other aspects of life."},
      {phrases:[{cn:"追求公务员岗位",en:"pursue civil service positions"},{cn:"获得稳定收入",en:"secure a stable income"},{cn:"创业",en:"start their own businesses"},{cn:"物质财富最大化",en:"maximise material wealth"},{cn:"实现抱负",en:"fulfil ambitions"}],sentenceCn:"一些人选择追求公务员岗位以获得稳定收入。一些人选择创业，希望物质财富最大化并实现抱负。",sentenceEn:"Some people choose to pursue civil service positions in order to secure a stable income. Some people choose to start their own businesses in order to maximise material wealth and fulfil ambitions."},
      {phrases:[{cn:"提供金钱奖励",en:"offer financial rewards"},{cn:"加薪",en:"offer a pay rise"},{cn:"提高工作满意度",en:"boost job satisfaction"},{cn:"增强动作动力",en:"enhance motivation"}],sentenceCn:"为优秀员工提供金钱奖励（如加薪）是个好主意。这有助于提高他们的工作满意度和动力。",sentenceEn:"It is a good idea for employers to offer financial rewards for excellent employees, such as a pay rise. This can help boost their job satisfaction and motivation."},
      {phrases:[{cn:"提拔员工到管理岗位",en:"promote employees to management positions"},{cn:"留住有经验的员工",en:"retain experienced employees"}],sentenceCn:"有时，提拔努力工作的员工到管理岗位很重要。这有助于留住这些有经验的员工。",sentenceEn:"Sometimes, it is important to promote hardworking employees to management positions. This helps retain these experienced employees."},
      {phrases:[{cn:"身体能力",en:"physical capabilities"},{cn:"做对体力要求很高的工作",en:"perform physically demanding tasks"}],sentenceCn:"人们在身体能力上有很大差异。有些人很难完成对体力要求很高的工作。",sentenceEn:"People vary in their physical capabilities. Some people struggle to perform physically demanding tasks."},
      {phrases:[{cn:"天赋",en:"innate talents"},{cn:"选择职业道路",en:"choose career paths"}],sentenceCn:"人们在天赋上存在显著差异。这直接影响了他们的职业道路选择。",sentenceEn:"People differ significantly in their innate talents. This has a direct impact on their career paths."}
    ],
    paragraphs: [
      {title:"Why do people move from one place to another?",type:"part3",cn:"我相信这样的决定是个人的，取决于各种情境因素。人们在经济状况、教育背景、婚姻状况、身体状况和年龄等方面存在差异，这些都影响着他们的生活决策、生活重点和生活方式。一些人选择搬到特定地方，以追求更好的职业机会或经济有保障，优先考虑稳定的收入和体面的生活。例如，在小城镇和农村地区，很多人搬迁到中国北京和深圳这样的大城市是很常见的，因为在那里他们通常能找到薪水更高的工作。相反，其他人可能会为了实现更平衡的生活方式而搬迁，重视更慢的生活节奏或者考虑家庭的需求。",en:"I believe that such decisions are personal and depend on various situational factors. People differ in terms of financial situations, educational backgrounds, marital status, physical condition, and age, all of which influence their life decisions, priorities, and ways of living. Some individuals choose to move to a specific place in pursuit of better career opportunities or financial security, prioritizing a stable income and a decent living. For example, it is not uncommon for many people in small towns and rural areas to relocate to larger cities such as Beijing and Shenzhen in China, where usually they can find better-paid jobs. In contrast, others may relocate to achieve a more balanced lifestyle, valuing a slower pace of life or considering the needs of their family."},
      {title:"Why do some people quit and change jobs?",type:"part3",cn:"个人决策往往受到各种个人情况的影响。由于财务状况、家庭背景、教育水平以及天赋和才华等因素的不同，人们的想法也大相径庭。这些因素反过来又影响他们的生活方式、生活重点、人生决策、价值观和态度。有些人更换工作主要是为了赚取更高的薪水，因为他们对目前的薪资不满意。例如，有些人可能会离开公务员职位，加入提供更具吸引力报酬的国际企业。这可以提高工作满意度和积极性，因为这让他们能够实现更高的生活水平。有些人寻求压力较小的工作，以更好地平衡工作和个人生活。",en:"Personal decisions are often influenced by a variety of personal circumstances. For instance, financial situations, family backgrounds, educational levels, and natural abilities and talents. Some people change jobs primarily to earn a higher income because they are dissatisfied with their current pay. For instance, some may leave civil service positions to join international companies, which offer more attractive remuneration. This can enhance job satisfaction and motivation, as this allows them to achieve a better standard of living. Some individuals seek less demanding jobs to better balance their work and personal lives."},
      {title:"How can people be happy?",type:"part3",cn:"我相信人们获得幸福的方式千差万别。诚然，人们在天生的身体、家庭、教育程度、家庭状况和背景等方面存在显著差异，这些因素反过来又塑造了他们的一生重点、偏好、生活方式和习惯。有些人可能从物质成功中获得幸福，因为收入稳定可以极大地影响他们的整体满意度和成就感。例如，许多人将大部分时间和精力投入到努力工作以获得晋升或高薪。这让他们感到深深的满足，因为他们不再需要担心经济问题。相反，另一些人可能更关注工作的非物质方面，例如，私生活平衡的机会或参与社区工作的工作。这些人发现人生的意义和幸福在于以超越物质财富的方式过上充实而有意义的生活。",en:"I believe people achieve happiness in very different ways. It\\'s true that people differ significantly in innate talents, physical capabilities, educational levels, family situation, and backgrounds. These factors, in turn, shape their priorities, preferences, lifestyles, and habits. For some people may derive happiness from material success, as financial stability can greatly influence their overall satisfaction and sense of fulfilment. For instance, many individuals dedicate most of their time and energy to working hard to earn promotions or high salaries. This gives them a deep sense of contentment, as they no longer have to worry about financial problems. In contrast, others may focus more on non-material aspects of jobs, such as the opportunity to maintain a balanced life or volunteer for community work. These individuals also find meaning and happiness in leading a rewarding and fulfilling life in ways that go beyond material wealth."},
      {title:"Is leisure time important to everyone? Why?",type:"part3",cn:"休闲时间的重要性因人而异。人们在天赋、身体能力、经济状况、家庭背景和教育程度方面存在显著差异，这些差异塑造了他们的偏好、认知、生活重心、价值观和习惯。对于一些人来说，休闲时间可能并不是很重要，因为他们以事业为导向。他们选择长时间工作以尽可能多地赚钱，从而提高他们的生活水平。例如，一些大学毕业生愿意在周末工作或轮班工作以获得加班工资、赚取知识，并获得专业知识，从而帮助他们提升职业生涯。这些人从获得更高的收入中找到快乐，这提高了他们的积极性和工作满意度。相比之下，休闲时间对于30多岁和40多岁的人来说变得更加重要，尤其是当他们有了家庭或变得更加注重健康时。在这个阶段，他们通常优先考虑拥有平衡的生活，他们认为这对他们的整体生活满意度至关重要。",en:"The importance of leisure time varies from person to person. People differ significantly in their innate talents, physical capabilities, financial situations, family backgrounds, and educational levels, all of which shape their preferences, perceptions, priorities, values, and habits. For some, leisure time may not seem very important because they are career-oriented. They choose to work long hours to earn as much income as possible, thus raising their standard of living. For instance, some university graduates are willing to work on weekends or take extra shifts to earn overtime pay and gain expertise, helping them advance their careers. These individuals find happiness in achieving a higher income, which boosts their motivation and job satisfaction. In contrast, leisure time becomes more important for people in their 30s and 40s, especially when they have families or become more health-conscious. At this stage, they often prioritize having a balanced life, which they see as essential to their overall life satisfaction."},
      {title:"Working or not to choose between a life without work and working, people would always choose not to work. Do you agree or disagree?",type:"essay",cn:"大多数人选择继续工作，因为生活成本高，很难达到理想的生活水平。这通常是由于人口增长和服务竞争，促使人们追求更昂贵的物质商品。人们很难支付生活开支，更不用说过上理想的生活，尤其是如果他们没有高薪工作。他们选择勤奋工作，因为努力工作可以提高生产力，为雇主创造收入，并有可能获得加薪。另一方面，一些人在实现财务自由后选择不工作，追求更轻松的生活方式。",en:"Some people hold the view that living without the need to work would be the chosen option for individuals. While I disagree with this assertion, I believe it may not universally apply to everyone. Most people choose to stay in the workforce because of the high cost of living and the difficulty in achieving an ideal standard of living. This is often due to population growth and service competition, which encourage the pursuit of more expensive material goods. People struggle to cover living expenses, let alone lead the life they desire, especially if they do not have well-paid jobs. They choose to work diligently because hard work can boost productivity, generate revenue for employers and potentially lead to a pay raise. This can elevate life satisfaction as they live without financial worries, afford what they like, and enjoy various life options, particularly if they live in poverty without financial support or savings. On the other hand, some people choose not to work when they reach a stage where they seek a vibrant life and have sufficient time for personal plans. This is understandable when they are financially secure. They might withdraw from work to pursue less demanding jobs, giving them time to pursue interests. For example, they can dedicate time to developing hobbies, volunteering, travelling, and other activities that lead to a fulfilling life. This lifestyle can enhance well-being, allow for exploration of personal potential, and foster a sense of achievement, thereby increasing life satisfaction. Conversely, devoting all their time to work-life can result in a monotonous life. In conclusion, I would argue that most people will choose to participate in work, though this may not hold true for those who have achieved financial security."},
      {title:"The only reason for people to work hard is to earn money. To what extent do you agree or disagree?",type:"essay",cn:"对许多人来说，努力工作的主要原因是赚更多的钱，因为它直接影响生活质量。鉴于当前的经济不确定性，他们的重点放在财务考量上。另一方面，没有紧迫物质需求的人可能会优先考虑非财务方面作为追求替代职业目标的动力。",en:"I strongly believe that there is only one motivator for working diligently. I partly agree with this view, although it may not be the case in some circumstances. For many people, the primary reason for working hard is the desire to earn more money, as it directly impacts the quality of life. Given the current economic uncertainty, their focus is on financial considerations. With the constantly rising costs of living, present challenges in achieving financial security. By working diligently, individuals can develop expertise, hone their problem-solving skills, impress their employers and clients, which often results in promotion and accompanying pay raises. A higher income not only covers basic expenses such as rent and food but also affords a better quality of life, provides options for travelling abroad, purchasing a comfortable home that offers an ideal living environment for their families. These financial aspirations are particularly relevant for individuals facing various financial responsibilities such as raising a family. On the other hand, individuals with no urgent material needs may prioritize non-financial aspects as a motivator to their pursuit of alternative career objectives in life. People vary greatly in terms of their personal talents, natural abilities, and aspirations. Some seek a sense of accomplishment by leveraging their skills to make meaningful contributions to their industry or society, which fully taps into their talents and leads to social approval and recognition from others. This is the case for individuals such as renowned athletes engaging in activities to promote progress within their specific sport or renowned scientists dedicating their careers regardless of financial rewards. Their devotion to their craft transcends financial incentives. In conclusion, I partially agree with the idea that it is money that motivates people to work hard in numerous cases, although I meanwhile acknowledge that the opposite can be true in some other cases."},
      {title:"In modern employment, some people work much harder than others. What makes people work harder than others? Is it always a good thing to work harder?",type:"essay",cn:"有些人追求不同，需要付出努力才可以达到目标，所以工作勤奋。但是过度工作可能会降低生活满意度，因为他们过分强调职业成就而忽视生活的其他方面。",en:"It has been found that both schools and offices have seen some people dedicating more time towards studies or work than others. It is intriguing to explore the reasons behind this and discuss its effects. Some people work diligently because they set targets in their lives and devote energy to attaining these objectives. It is true that people differ from each other in terms of life experiences, financial situations, family backgrounds and natural capabilities, which lead to differences in pursuits, values and life attitudes. People living in poverty tend to work tirelessly in order to pursue a comfortable or luxurious life, such as buying a spacious house or affording a foreign holiday, considering that they can raise customer satisfaction and win recognition of employers. Meanwhile, some people devote effort to exploring their talents and helping others improve the standard of living for the simple reason that they intend to gain a sense of achievement and lead a meaningful life. For example, they may choose to set up their own business to realise their dreams of providing products and services that benefit communities, which require tremendous hard work to succeed. By comparison, others are less hardworking as they tend to lead an ordinary life without holding ambitions. Working hard may lower life satisfaction since they overemphasise career achievements and ignore other aspects of life. This arises from the fact that it is difficult to succeed nowadays in a competitive world. working long hours reduces time for physical exercise, eating healthily, and maintaining a regular sleeping routine, thereby causing health problems, including obesity, heart disease, stomachache and eating disorders. Moreover, overworking can also make it impossible for them to spend quality time with family and friends to foster bonds, such as dining out, holding parties, going for a picnic and travelling together, which may lead to feelings of isolation and loneliness. They are unable to lead a healthy and happy life, meaning that working hard to have a successful career may not be worthwhile. In conclusion, some people\\'s tendency to work harder than their peers is attributed primarily to the fact that they intend to attain their own targets. This can be perceived as a negative change."},
      {title:"Many young people change their jobs or career every few years. What are the reasons for this? Do the advantages of this outweigh the disadvantages?",type:"essay",cn:"年轻人不断求职，因为他们有多样化的需求，渴望找到完全符合期望的工作。频繁跳槽可能导致挫败感，因为人们发现很难实现目标。",en:"It has been found that switching jobs or even making career changes regularly has become a clear trend among younger generations. It is intriguing to explore the reasons behind this and discuss its effects. Young people constantly engage in job-hunt because they have diverse needs and aspire to find jobs that match their expectations perfectly. It is true that people differ from each other in terms of life experiences, financial situations, family backgrounds and natural capabilities, which lead to differences in pursuits, values and life attitudes. Some young people are eager to find high-paying jobs or work in lucrative industries, considering that they either struggle with financial constraints or pursue material wealth. Meanwhile, they explore different career paths or job opportunities for the simple reason that they are motivated by opportunities to showcase talents and achieve personal ambitions, such as working for companies where they can acquire new skills, take on challenges and have possibility of filling management positions. In contrast, people in other age groups prioritise financial security since they have numerous obligations to meet. Frequent job hopping may lead to feelings of frustration since people find it difficult to attain their objectives. This arises from the fact that it is difficult to succeed nowadays in a competitive world. They struggle to build expertise in a specific role and build strong social connections in an industry, thereby failing to achieve targets of raising earnings and obtaining a promotion. Meanwhile, they dedicate their time to pursuing a successful career and personal achievements, which lead to a lack of time for other aspects of life, such as engaging in physical exercise and fostering bonds with family and friends. They are likely to lead an unhappy life, meaning that they suffer from emotional and physical health issues. By comparison, if they stay in the same job and stick to a specific career path, they may enjoy better chances of success. In conclusion, young people\\'s tendency to search for an ideal job is attributed primarily to the fact that they intend to attain their own targets. This can be perceived as a negative change."}
    ]
  },
  {
    id: "age",
    title: "个人差异-年龄",
    groups: [
      {phrases:[{cn:"在人生的不同阶段",en:"at different stages of life"},{cn:"身体能力不同",en:"differ in physical abilities"},{cn:"认知能力各异",en:"vary in cognitive skills"},{cn:"有体力和脑力",en:"physically and mentally capable"}],sentenceCn:"人生不同阶段的人在身体能力和认知方面有所不同。年轻人在体力和脑力上更能够适应变化，比其他年龄段更有优势。",sentenceEn:"People at different stages of life differ in physical abilities and cognitive skills. Young people are more physically and mentally capable of embracing changes than other age groups."},
      {phrases:[{cn:"记忆力差",en:"suffer from poor memory"},{cn:"视力下降",en:"struggle with declining vision"},{cn:"身体能力下降",en:"experience a drop in physical capabilities"}],sentenceCn:"老年人可能面临记忆力差和视力下降等挑战。由于身体能力下降，他们很难找到工作。",sentenceEn:"Elderly people are likely to face challenges such as poor memory and declining vision. They struggle to find work, due to a drop in physical capabilities."},
      {phrases:[{cn:"随着年龄增长",en:"with age"},{cn:"容易出现健康问题",en:"become prone to health problems"},{cn:"应对高强度工作",en:"handle high-stress jobs"}],sentenceCn:"随着年龄增长，人们更容易出现健康问题。他们应对高压工作的能力也会下降。",sentenceEn:"With age, people are prone to health problems. They are less able to handle high-stress jobs."},
      {phrases:[{cn:"技术上与时俱进",en:"keep up with technological changes"},{cn:"减少收入能力",en:"reduce earning capacity"}],sentenceCn:"对于老年人来说，跟上技术变化并不容易。技术进步导致了他们收入能力的下降。",sentenceEn:"It is not easy for elderly people to keep up with technological changes. Technological advancements have led to a drop in their earning capacity."},
      {phrases:[{cn:"冒险",en:"take risks"},{cn:"承受挫折，从挫折中恢复",en:"recover from setbacks"}],sentenceCn:"年轻人更愿意冒险。他们更可能接受挫折。",sentenceEn:"Young people are more willing to take risks. They are more likely to recover from setbacks."},
      {phrases:[{cn:"变得不敢冒险",en:"become risk-averse"},{cn:"年龄大了",en:"are advanced in age"},{cn:"承受损失，从损失中恢复",en:"recover from the losses"}],sentenceCn:"老年人往往厌倦风险。他们年事已高，很难承受犯错带来的损失。",sentenceEn:"Elderly people tend to be risk-averse. They are advanced in age and it\\'s difficult for them to recover from the losses caused by mistakes."},
      {phrases:[{cn:"随着年龄增长而智慧增长",en:"with age comes wisdom"},{cn:"决策时谨慎",en:"adopt a prudent approach to decision making"}],sentenceCn:"随着年龄的增长而智慧增长。老年人在决策时往往会采取更为谨慎的方法。",sentenceEn:"With age comes wisdom. Elderly people tend to adopt a more prudent approach to decision making."},
      {phrases:[{cn:"低估风险",en:"underestimate risks"},{cn:"高估能力",en:"overestimate abilities"},{cn:"做出仓促的决定",en:"make hasty decisions"}],sentenceCn:"年轻人往往低估风险并高估自己的能力。他们更容易做出仓促的决定。",sentenceEn:"Young people tend to underestimate risks and overestimate their own abilities. They are often more prone to making hasty decisions."},
      {phrases:[{cn:"咨询长辈",en:"consult seniors"},{cn:"借鉴生活经验",en:"draw upon life experiences"},{cn:"避免错误",en:"avoid mistakes"}],sentenceCn:"对年轻人来说，咨询长辈是很重要的。年轻人借鉴老年人的生活经验以避免错误也很重要。",sentenceEn:"It is important for young people to consult seniors. It is important for young people to draw upon elderly people\\'s life experiences to avoid mistakes."}
    ],
    paragraphs: [
      {title:"Who do you think would prefer to try new things, young people or old people?",type:"part3",cn:"我认为年轻人肯定更倾向于接受新技术。处于不同人生阶段的人在身体能力、认知能力、生活经验、家庭状况和收入方面都存在差异，所有这些都会影响他们的生活方式、选择、态度和生活重点。年轻人精力充沛，这意味着他们有更多的精力去获取适应变化所需的知识和技能，这也意味着他们有足够的信心去处理适应变化可能带来的负面结果。例如，换工作往往需要付出脑力和体力，学习新技能和知识，因此年轻人通常更能应对此类挑战。相比之下，老年人往往不太愿意接受改变，因为他们可能会面临记忆力、身体能力、精力和认知能力的下降。",en:"I think young people are definitely more likely to adopt new technologies. People at different stages of life differ in physical abilities, cognitive skills, life experiences, family situations, and income, all of which influence their lifestyle choices, attitudes, and priorities. Young people are energetic, which means they have more energy to acquire the knowledge and skills required to adapt to changes. They are also more confident in their ability to handle the potential negative consequences of adapting to changes. For example, changing jobs often demands mental energy and physical energy. It takes hard work to learn new skills and knowledge to adjust to the changes. As a result, young people are generally better equipped to handle such challenges. In contrast, older people are often less willing to embrace change due to a decline in cognitive skills, physical abilities, stamina, and resilience. They may also be less psychologically prepared to face the challenges associated with major life changes, such as changing jobs, moving to a new city, or starting their own business."},
      {title:"Who do you think would make changes more often, young people or old people?",type:"part3",cn:"我认为年轻人无疑是最容易接受改变的。处于不同人生阶段的人在身体能力、认知能力、生活经验、家庭状况和收入方面都存在差异，所有这些都会影响他们的生活方式、选择、态度和生活重点。年轻人精力充沛，这意味着他们有更多的精力去获取适应变化所需的知识和技能。例如，换工作往往需要付出脑力和体力。相比之下，老年人往往不太愿意接受改变，因为他们可能会面临记忆力、身体能力、精力和认知能力的下降。",en:"I think it\\'s definitely young people who are most likely to embrace change. People at different stages of life vary in physical abilities, cognitive skills, life experiences, family situations, and income—all of which influence their lifestyle choices, attitudes, and priorities. Young people are energetic, knowledgeable, and have the stamina required to adapt to changes. They are also more confident in their ability to handle the potential negative consequences of adapting to changes. For example, changing jobs often demands mental energy and physical energy. It takes hard work to learn new skills and knowledge to adjust to the changes. As a result, young people are generally better equipped to handle such challenges. In contrast, older people are often less willing to embrace change due to a decline in cognitive skills, physical abilities, stamina, and resilience. They may also be less psychologically prepared to face the challenges associated with major life changes, such as changing jobs, moving to a new city, or starting their own business."},
      {title:"What are the differences between young people and older people in using a mobile phone?",type:"part3",cn:"我认为年轻人和老年人使用手机的目的非常不同。处于不同人生阶段的人在身体能力、认知能力、生活经验、家庭状况和收入方面都存在差异。老年人可能已经退休，因为他们不再有足够的身体或认知能力来胜任高压力的工作。在这种情况下，他们通常使用手机与朋友、家人保持联系。相比之下，年轻人通常还在工作，他们更倾向于将手机用于与工作相关的目的。",en:"I think young people and elderly people use cell phones for very different purposes. It is true that people at different stages of life vary in physical abilities, cognitive skills, life experiences, family situations, and income—all of which influence their lifestyle choices, attitudes, and priorities. Elderly people may have already retired, because they are no longer physically or mentally capable of handling high-stress jobs. In these circumstances, they usually use their cell phones to stay in touch with friends, family, co-workers or other people when needed. For example, if they experience a fall or have an accident, they need to make an emergency call to ask for assistance. In such situations, cell phones provide crucial support for their lives. In contrast, young people are usually still in the workforce. They tend to use their phones more frequently for work-related purposes, such as making phone calls, exchanging messages with colleagues, supervisors, or clients, or arranging meetings with colleagues, supervisors, or clients."},
      {title:"Who should receive a higher salary, young people or older people?",type:"part3",cn:"通常来说，在工作场所，随着年龄的增长，工资也会增加。这主要是因为老年人带来了智慧和宝贵的生活经验。随着年龄的增长，个人有更多的时间来获取经验，这使他们更能够做出明智的决定。这种谨慎的方法可以减少风险，最大化利润，并防止潜在的问题。这种品质在年轻员工中往往较为缺乏，他们更容易做出草率的决定。",en:"Typically, salaries tend to increase with age for those still in the workforce. This is largely because older individuals have valuable life experience. Over time, the individual have gained more life experience. This makes them more capable of making sensible decisions. For example, they are more likely to take a thoughtful approach by assessing the situation, gathering information, considering the options, and weighing the risks before identifying the best course of action. This cautious approach can reduce risks, maximise profits and prevent potential problems. They are also more likely to avoid negative outcomes. Such qualities are less common among younger employees, who are often more prone to making hasty decisions."},
      {title:"What can older people teach young people?",type:"part3",cn:"我认为老年人可以向年轻人分享他们的现实生活经验。随着年龄的增长，智慧也会随之而来。在不同情况下解决问题的能力、决策能力和其他专业知识也会随着年龄的增长而增长。老年人可以教年轻人如何分析挑战、收集信息、权衡风险，并在得出结论之前考虑各种选择。这个过程可以帮助年轻人做出明智的决定，避免潜在的错误。",en:"I think older people can share their real-life experiences with young people. As I mentioned earlier, with age comes wisdom, and the ability to solve problems in different situations, decision-making skills and other professional knowledge also grow with age. They often have a deeper understanding of general issues. For example, they may teach young people how to handle difficult clients, demanding supervisors, or colleagues when things get tough. You young people may face various challenges in the workplace, and older people can navigate such situations. In contrast, young people, due to their limited life experience, may sometimes result in making hasty decisions and suffer undesirable consequences as a result."},
      {title:"In many countries, the proportion of older people is steadily increasing. Does this trend have positive or negative effects on society?",type:"essay",cn:"随着年龄增长，许多人身体能力下降，很难留在劳动力市场。政府必须在退休后为他们分配更多资金。另一方面，人口老龄化在某些情况下可以有益于国家，因为老年人可以贡献他们的智慧。",en:"Is it clear that many countries have seen their elderly population grow rapidly in recent years. This trend offers certain advantages. Older people primarily become a problem if the country does not have sufficient resources to support them, mainly because it does not have enough taxpayers. It is worth noting that with age, many individuals experience a decline in physical abilities. They struggle to remain in the workforce since they can no longer meet the demands of modern workplaces. As a result, governments must allocate longer funds after retirement age for them, especially as they live longer lives after retirement. For instance, increased spending is required for pension, health care services, and retirement communities, which can impose a heavy financial burden. Less funding is available for other critical projects, such as education, scientific research and infrastructure development, which can hinder economic growth and social progress. On the other hand, population aging can benefit a country in certain circumstances, best because elderly people can contribute their wisdom, as older individuals have gained valuable lessons from decades of working and life experience. When life expectancy increases significantly, countries usually benefit from their expertise constantly. Examples include volunteers for non-profit organizations and charities, working as consultants for companies, providing training, or serving as advisors for institutions. Their practical experience enables them to direct companies away from arriving at incorrect conclusions or making hasty decisions. In conclusion, a significant rise in the proportion of elderly people tends to have negative effects on society, even though their positive contributions and impacts cannot be ignored."},
      {title:"Some countries have an ever-increasing proportion of population who are aged 15 and younger. What is your opinion of the current and future effects it may have in those countries?",type:"essay",cn:"年轻人口比例增大可以在未来有益于国家，因为他们通常具备生产力、创造潜力和其他对国家发展至关重要的优势。另一方面，不断扩大的年轻一代可能会对社会构成挑战，特别是在短期内，因为他们可能会给国家的设施和资源带来压力。",en:"It is clear that some countries have experienced a constant and rapid expansion of their younger generation. This trend undoubtedly has its positive effects, although it also comes with certain disadvantages. A larger proportion of people aged fifteen or younger can benefit a country in the future primarily because they typically possess productivity, creative potential, and other advantages crucial for a nation\\'s development. It is worth noting that young people often have ambitions and aspirations. They are willing to take risks and put their creative ideas into practice since they are more resilient to failures and willing to start over. They work long hours to pursue their dreams and study diligently to acquire knowledge as they have stamina and cognitive skills required for these activities. For example, young people are more willing to spend time learning how to use ChatGPT and other artificial tools and integrate such technology in their work, which can free them from repetitive tasks. Their presence in the workforce can enhance productivity and foster innovation, thereby contributing to social progress. In contrast, elderly people often experience declines in energy levels, cognitive skills, and physical abilities, which can limit their contributions to the workforce. On the other hand, an expanding younger generation can potentially pose challenges to society, particularly in the short term, because they may place a strain on a country\\'s facilities and resources. It is important to note that young people often lack the physical strength, knowledge, and skills needed to enter the labor market, as they remain in the education system. The government is required to increase spending on schools and childcare facilities, which can place a strain on financial resources for those economically significant projects, such as transport infrastructure improvement. Moreover, families and taxpayers must dedicate a significant portion of their income to financially support children, which limits their ability to contribute to broader economic activity. Slow economic growth, in turn, weaken people\\'s purchasing power, ultimately having a negative impact on the overall quality of life. In conclusion, a significant rise in the proportion of young people has positive effects in the long run, even though its short-term negative impacts cannot be overlooked."},
      {title:"Some people think getting old is bad for them in the modern world, while others think older people today live better lives than in the past. Discuss both opinions and give your view.",type:"essay",cn:"在一些国家，老年人可能面临许多挑战，因为他们没有得到社区或家庭的足够支持。在一些国家，老一辈人享有更好的生活质量，因为他们可以过上更健康、更长寿的生活，同时仍然是社会中有贡献的成员。",en:"The standard of living for elderly people today has been argued to be significantly better than that of previous generations. I agree with this perspective, although some people argue the opposite. Elderly people can face numerous challenges in some countries because they do not receive sufficient support from their communities or families. This often occurs in countries where policymakers lack the financial means to support an ever-growing aging population. In response to this demographic change, governments may raise the pension eligibility age, forcing many elderly people to continue working even as they experience declines in cognitive and physical abilities, making it difficult for them to meet workforce demands. Engaging in physically or mentally demanding jobs can increase their susceptibility to health problems because they lack the time to recover from hard work. Alternatively, if they choose to leave their jobs, they may not have sufficient savings to support a comfortable retirement, thereby struggling with financial problems, health issues, and emotional distress. In some countries, older generations enjoy a better quality of life because they can live healthier and longer lives while remaining productive members of society. This often occurs in places where people have access to social benefits and medical services without financial concerns or worries about health problems. The availability of these resources, including regular physical check-ups that prevent health conditions, can help slow the aging process. They can stay in the workforce and engage in other activities that contribute to society or family, such as doing unpaid work and looking after grandchildren. They can maintain a physically and socially active lifestyle, which offers them a sense of worthiness and well-being in old age. In my opinion, whether people can lead a happy life in their older age heavily depends on whether a country has the resources to meet their needs. This includes ensuring financial security and minimizing the effects of health problems on their well-being."},
      {title:"In some cultures it is argued that the old age should be valued, while in some cultures youth is more valued. Discuss both views and give your opinion.",type:"essay",cn:"一些社会重视老年人，因为普遍认为这些人可以为社会的运作做出重大贡献。相反，在某些文化中，年轻人受到重视，因为他们被认为有能力挑战现状，帮助社会进步。",en:"In some cultures, elderly people are appreciated and held in high regard. This is understandable although in other societies, young people are also appreciated. Some societies value elderly people because of the prevailing belief that these individuals can significantly contribute to the functioning of society. This is particularly true in risk-averse societies where the priority is to avoid financial losses from making wrong decisions, such as implementing radical changes. Elderly people are often seen as prudent individuals with extensive life experience, enabling them to make sensible decisions in challenging situations. They are capable of comparing different choices, weighing the pros and cons before arriving at a conclusion, and usually avoiding high-risk and unpredictable decisions. This is why they often assume decision-making roles in both the corporate world and families, where they decide how to utilize financial resources to satisfy different stakeholders and achieve progress. Conversely, young people are valued in some cultures because they are seen as capable of challenging the status quo and helping society advance. This is particularly valid in highly competitive environments where standing out is essential. Young people often have the energy and cognitive skills needed to adopt advanced technology, experiment with creative ideas, and embrace reforms. They have the courage to pursue their ambitions and incorporate innovations, as they are young enough to recover from failures. Their willingness to take risks and pursue radical changes can lead to breakthroughs in various fields and industries. Young entrepreneurs, who proactively launch businesses, can act as game-changers by introducing unprecedented products with unique features to global markets, generating substantial revenue for their countries. From my perspective, it is important to acknowledge the value of young people in a fast-changing world, although it is the older generation in other cultures whose wisdom and experience."}
    ]
  },
  {
    id: "health",
    title: "健康话题",
    groups: [
      {phrases:[{cn:"更加注重健康",en:"become more health-conscious"},{cn:"健康的生活方式",en:"lead a healthy lifestyle"}],sentenceCn:"许多人变得更加注重健康。健康的生活方式对他们的幸福感有直接影响。",sentenceEn:"Many people have become more health-conscious. Leading a healthy lifestyle has a direct impact on their well-being."},
      {phrases:[{cn:"培养兴趣爱好",en:"pursue hobbies"},{cn:"管理情绪",en:"manage emotions"},{cn:"对抗抑郁",en:"combat depression"}],sentenceCn:"孩子们培养兴趣爱好总是有益的。比如画画或阅读可以帮助他们管理情绪并对抗抑郁。",sentenceEn:"It\\'s always beneficial for children to pursue hobbies. Activities like drawing or reading can help them manage emotions and combat depression."},
      {phrases:[{cn:"限制工作时间",en:"limit working hours"},{cn:"改善公众整体幸福感",en:"improve overall public well-being"}],sentenceCn:"有时有必要限制工作时间。这可以帮助改善公众的整体幸福感。",sentenceEn:"Sometimes it is necessary to limit working hours. This can help to improve overall public well-being."},
      {phrases:[{cn:"定期进行体检",en:"undergo regular physical check-ups"},{cn:"发现健康问题",en:"detect health problems"},{cn:"提供及时的治疗",en:"provide timely treatment"}],sentenceCn:"健康专业人士建议人们定期进行体检。这有助于及早发现健康问题并提供及时的治疗。",sentenceEn:"Health professionals advise people to undergo regular physical check-ups. This can help detect health problems early and provide timely treatment."},
      {phrases:[{cn:"去度假",en:"go on holiday"},{cn:"恢复精力",en:"recharge batteries"},{cn:"减轻压力",en:"reduce stress levels"}],sentenceCn:"去度假总是有好处的。这可以帮助我们恢复精力并减轻压力。",sentenceEn:"It\\'s always beneficial to go on holiday. This can help us recharge batteries and reduce stress levels."},
      {phrases:[{cn:"经常运动",en:"play sport regularly"},{cn:"保持身材",en:"stay fit"}],sentenceCn:"经常运动是必要的。这可以帮助我们保持健康。",sentenceEn:"It is necessary to play sport regularly. It can help us stay fit."},
      {phrases:[{cn:"定期锻炼",en:"exercise regularly"},{cn:"去健身房",en:"go to the gym"},{cn:"保持健康的体重",en:"maintain a healthy weight"}],sentenceCn:"定期锻炼很重要，比如去健身房。这可以帮助我们保持健康的体重。",sentenceEn:"It is always important to exercise regularly, such as going to the gym. This can help us maintain a healthy weight."},
      {phrases:[{cn:"吃家常菜",en:"eat a home-cooked meal"},{cn:"高糖",en:"high in sugar"},{cn:"高盐",en:"high in salt"}],sentenceCn:"吃家常菜总是好的。快餐通常含有高糖或高盐。",sentenceEn:"It\\'s always good to eat a home-cooked meal. Fast food is usually high in sugar or high in salt."},
      {phrases:[{cn:"去看电影",en:"go to the cinema"},{cn:"参加音乐会",en:"attend a concert"},{cn:"改善情绪",en:"lift our spirits"}],sentenceCn:"偶尔去看电影或参加音乐会总是好的。这可以改善情绪。",sentenceEn:"It\\'s always good to go to the cinema or attend a concert from time to time. This can lift our spirits."},
      {phrases:[{cn:"参加户外活动",en:"engage in outdoor activities"},{cn:"在自然环境中",en:"in natural settings"},{cn:"摆脱日常生活的单调",en:"provide a break from the monotony of everyday life"}],sentenceCn:"许多人今天更喜欢徒步旅行或在自然环境中参加户外活动。这有助于他们放松，并摆脱日常生活的单调。",sentenceEn:"Many people today prefer hiking or engaging in outdoor activities in natural settings. This helps them relax and provides a break from the monotony of everyday life."}
    ],
    paragraphs: [
